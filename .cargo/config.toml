[build]
# sccache wraps rustc for compilation caching.
# In CI, SCCACHE_GHA_ENABLED=true uses GitHub Actions cache backend.
# Locally, sccache uses a local disk cache (~/.cache/sccache).
# Install: cargo install sccache
# rustc-wrapper = "sccache"  # Uncomment when sccache is installed.

[target.wasm32-unknown-unknown]
runner = "wasm-bindgen-test-runner"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]
