##############################################################################
# Local Development Infrastructure
# Usage:
#   docker-compose up -d                 # Start all infra
#   docker-compose up -d postgres kafka  # Start specific services
#   docker-compose down -v               # Stop and remove volumes
##############################################################################

services:
  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: experimentation
      POSTGRES_USER: experimentation
      POSTGRES_PASSWORD: localdev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U experimentation"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    ports: ["2181:2181"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    ports: ["9092:9092", "29092:29092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper: { condition: service_started }
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      kafka: { condition: service_healthy }
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo 'Creating Kafka topics...'
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic exposures         --partitions 4 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic metric_events     --partitions 8 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic reward_events     --partitions 4 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic qoe_events        --partitions 4 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic guardrail_alerts  --partitions 2 --replication-factor 1
        echo 'Done.'

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    ports: ["8081:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka: { condition: service_healthy }

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka-ui:
    image: docker.redpanda.com/redpandadata/console:latest
    ports: ["8080:8080"]
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://schema-registry:8081
    depends_on:
      kafka: { condition: service_healthy }

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports: ["3000:3000"]
    environment:
      # Next.js server-side rewrite targets (host.docker.internal = host machine)
      BACKEND_MANAGEMENT_URL: http://host.docker.internal:50055
      BACKEND_METRICS_URL: http://host.docker.internal:50056
      BACKEND_ANALYSIS_URL: http://host.docker.internal:50053
      BACKEND_BANDIT_URL: http://host.docker.internal:50054
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
