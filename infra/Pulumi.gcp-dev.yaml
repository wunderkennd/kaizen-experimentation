config:
  # Provider routing — selects the GCP branch in pkg/gcp/ and Redpanda Cloud streaming.
  kaizen-experimentation:cloudProvider: gcp
  # streamingProvider=redpanda selects the cloud-agnostic Redpanda Cloud module at
  # infra/pkg/streaming/redpanda.go. The Redpanda Cloud control plane provisions the
  # underlying cluster on GCP and surfaces a Kafka-protocol bootstrap endpoint plus a
  # built-in Schema Registry. The GCP streaming arm is wired via Deploy()'s Stage 4
  # block (#533 onward), and M2 Pipeline (#489) consumes the bootstrap brokers + schema
  # registry URL through gcp.NewCompute.
  kaizen-experimentation:streamingProvider: redpanda

  # Core identification
  kaizen-experimentation:environment: dev
  # Public zone suffix consumed by the edge stage (#496): the LB terminates
  # kaizen.{domain}, assign.kaizen.{domain}, api.kaizen.{domain}. Placeholder
  # satisfies `pulumi preview`; override per real account before delegating DNS.
  kaizen-experimentation:domain: example.com

  # Edge security (#496): wafEnabled gates the Cloud Armor policy exactly as
  # it gates WAF v2 on the AWS stacks; the rate limit mirrors the AWS default
  # (1000 requests / 5 min / IP).
  kaizen-experimentation:wafEnabled: "true"
  kaizen-experimentation:wafRateLimitPerIP: "1000"

  # GCP project + Artifact Registry settings
  # Override `gcpProjectId` per real account before applying. The default here
  # is a placeholder that satisfies `pulumi preview` against the unit-test
  # mocks but is NOT a real GCP project.
  kaizen-experimentation:gcpProjectId: kaizen-experimentation-dev
  kaizen-experimentation:gcpRegion: us-central1
  kaizen-experimentation:gcpArLocation: us
  # CI push principal — set after provisioning the Workload Identity Pool +
  # GitHub Actions OIDC binding (see docs/runbooks/artifact-registry-credentials.md).
  # Example value (uncomment + customise once the WIP exists):
  #   kaizen-experimentation:gcpCiPushPrincipal: "principalSet://iam.googleapis.com/projects/<PROJECT_NUMBER>/locations/global/workloadIdentityPools/github-actions/attribute.repository/<OWNER>/<REPO>"
  # Cloud Run runtime SAs that must pull from AR (comma-separated). Empty
  # for now — populated when compute lands in Phase 1+.
  # kaizen-experimentation:gcpRunPullPrincipals: "serviceAccount:kaizen-run@kaizen-experimentation-dev.iam.gserviceaccount.com"

  # GCP network subnet CIDR ranges (read by pkg/gcp/network).
  kaizen-experimentation:gcpPublicSubnetCidr: "10.0.0.0/20"
  kaizen-experimentation:gcpPrivateSubnetCidr: "10.0.16.0/20"
  kaizen-experimentation:gcpVpcConnectorCidr: "10.0.32.0/28"
  kaizen-experimentation:gcpVpcConnectorMachineType: e2-micro

  # The remaining values are required by config.LoadConfig() because LoadConfig
  # is shared across providers. Stage gates short-circuit before any AWS-only
  # resources (RDS / MSK / EC2) are provisioned for cloudProvider=gcp; these
  # values therefore have no effect today and exist solely to satisfy the
  # `cfg.Require*` calls. Each Phase 1 sibling PR that lands a real GCP arm
  # will replace the relevant entries with GCP-native values (e.g.,
  # cloudSqlTier instead of rdsInstanceClass).
  kaizen-experimentation:vpcCidr: "10.0.0.0/16"
  kaizen-experimentation:rdsInstanceClass: db.t4g.medium
  kaizen-experimentation:rdsMultiAz: "false"
  kaizen-experimentation:mskBrokerCount: "2"
  kaizen-experimentation:mskInstanceType: kafka.t3.small
  kaizen-experimentation:redisNodeType: cache.t4g.medium
  kaizen-experimentation:m4bInstanceType: t3.large
  kaizen-experimentation:natGatewayCount: "1"
  kaizen-experimentation:fargateMinTasks: "1"
  kaizen-experimentation:cloudwatchRetentionDays: "7"

  # Redpanda Cloud configuration.
  # Secrets (clientId, clientSecret, kafkaPassword) are managed via
  # `pulumi config set --secret redpanda:<key>` — placeholder comments below
  # must be replaced before the first `pulumi up` targeting this stack.
  redpanda:cloudProvider: gcp
  redpanda:region: us-central1
  redpanda:zones: us-central1-a,us-central1-b,us-central1-c
  redpanda:throughputTier: tier-1-gcp-v2
  redpanda:clusterType: dedicated
  redpanda:connectionType: private
  redpanda:kafkaUsername: kaizen-redpanda-user

  # Secrets — set with `pulumi config set --secret`.
  # redpanda:clientId        SET_VIA_PULUMI_CONFIG_SET_SECRET
  # redpanda:clientSecret    SET_VIA_PULUMI_CONFIG_SET_SECRET
  # redpanda:kafkaPassword   SET_VIA_PULUMI_CONFIG_SET_SECRET
