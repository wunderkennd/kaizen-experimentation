syntax = "proto3";

package experimentation.management.v1;

import "google/protobuf/empty.proto";
import "experimentation/common/v1/experiment.proto";
import "experimentation/common/v1/metric.proto";
import "experimentation/common/v1/layer.proto";
import "experimentation/common/v1/targeting.proto";
import "experimentation/common/v1/surrogate.proto";

option go_package = "github.com/org/experimentation/gen/go/management/v1;managementv1";

// ExperimentManagementService is implemented in Go (M5).
// Manages experiment lifecycle including STARTING/CONCLUDING transitional states,
// auto-pause guardrails, bucket reuse, and surrogate model registration.
service ExperimentManagementService {
  // Experiment CRUD.
  rpc CreateExperiment(CreateExperimentRequest) returns (experimentation.common.v1.Experiment);
  rpc GetExperiment(GetExperimentRequest) returns (experimentation.common.v1.Experiment);
  rpc UpdateExperiment(UpdateExperimentRequest) returns (experimentation.common.v1.Experiment);
  rpc ListExperiments(ListExperimentsRequest) returns (ListExperimentsResponse);

  // Lifecycle transitions. M5 enforces type-specific validation gates.
  // DRAFT -> STARTING: validates config, confirms metrics, checks power.
  // RUNNING -> CONCLUDING: triggers final analysis in M4a.
  rpc StartExperiment(StartExperimentRequest) returns (experimentation.common.v1.Experiment);
  rpc ConcludeExperiment(ConcludeExperimentRequest) returns (experimentation.common.v1.Experiment);
  rpc ArchiveExperiment(ArchiveExperimentRequest) returns (experimentation.common.v1.Experiment);

  // Pause/resume. Auto-pause is triggered by guardrail_alerts Kafka consumer.
  rpc PauseExperiment(PauseExperimentRequest) returns (experimentation.common.v1.Experiment);
  rpc ResumeExperiment(ResumeExperimentRequest) returns (experimentation.common.v1.Experiment);

  // Metric definitions.
  rpc CreateMetricDefinition(CreateMetricDefinitionRequest) returns (experimentation.common.v1.MetricDefinition);
  rpc GetMetricDefinition(GetMetricDefinitionRequest) returns (experimentation.common.v1.MetricDefinition);
  rpc ListMetricDefinitions(ListMetricDefinitionsRequest) returns (ListMetricDefinitionsResponse);

  // Layer management.
  rpc CreateLayer(CreateLayerRequest) returns (experimentation.common.v1.Layer);
  rpc GetLayer(GetLayerRequest) returns (experimentation.common.v1.Layer);
  rpc GetLayerAllocations(GetLayerAllocationsRequest) returns (GetLayerAllocationsResponse);

  // Targeting rules.
  rpc CreateTargetingRule(CreateTargetingRuleRequest) returns (experimentation.common.v1.TargetingRule);

  // Surrogate model management.
  rpc CreateSurrogateModel(CreateSurrogateModelRequest) returns (experimentation.common.v1.SurrogateModelConfig);
  rpc ListSurrogateModels(ListSurrogateModelsRequest) returns (ListSurrogateModelsResponse);
  rpc GetSurrogateCalibration(GetSurrogateCalibrationRequest) returns (experimentation.common.v1.SurrogateModelConfig);
  rpc TriggerSurrogateRecalibration(TriggerSurrogateRecalibrationRequest) returns (google.protobuf.Empty);

  // Config streaming (ADR-025 Phase 2). M1 subscribes to receive real-time config deltas.
  // Server first streams all RUNNING/PAUSED experiments (backfill), then streams deltas.
  // Reconnect-safe: clients send last_known_version; server re-streams if behind.
  rpc StreamConfigUpdates(StreamConfigUpdatesRequest) returns (stream ConfigUpdateEvent);

  // Portfolio optimization (ADR-019).
  // Returns per-experiment traffic allocation recommendations, conflict detection,
  // and priority-weighted variance budget for all RUNNING experiments in a layer.
  rpc GetPortfolioAllocation(GetPortfolioAllocationRequest) returns (GetPortfolioAllocationResponse);
}

// --- Config Streaming ---
message StreamConfigUpdatesRequest {
  // Last config version the client saw. Server backfills from 0 if stale.
  int64 last_known_version = 1;
}

message ConfigUpdateEvent {
  // Updated experiment. Nil if is_deletion = true.
  experimentation.common.v1.Experiment experiment = 1;
  // True when the experiment has been ARCHIVED or its allocation fully released.
  bool is_deletion = 2;
  // Monotonically increasing per M5 instance. Not wall-clock; not persisted.
  int64 version = 3;
}

// --- Experiment CRUD ---
message CreateExperimentRequest { experimentation.common.v1.Experiment experiment = 1; }
message GetExperimentRequest { string experiment_id = 1; }
message UpdateExperimentRequest { experimentation.common.v1.Experiment experiment = 1; }
message ListExperimentsRequest {
  int32 page_size = 1;
  string page_token = 2;
  experimentation.common.v1.ExperimentState state_filter = 3;
  experimentation.common.v1.ExperimentType type_filter = 4;
  string owner_email_filter = 5;
}
message ListExperimentsResponse {
  repeated experimentation.common.v1.Experiment experiments = 1;
  string next_page_token = 2;
}

// --- Lifecycle ---
message StartExperimentRequest { string experiment_id = 1; }
message ConcludeExperimentRequest { string experiment_id = 1; }
message ArchiveExperimentRequest { string experiment_id = 1; }
message PauseExperimentRequest {
  string experiment_id = 1;
  string reason = 2;
  // Whether this is an auto-pause triggered by guardrail breach.
  bool is_guardrail_auto_pause = 3;
}
message ResumeExperimentRequest { string experiment_id = 1; }

// --- Metric ---
message CreateMetricDefinitionRequest { experimentation.common.v1.MetricDefinition metric = 1; }
message GetMetricDefinitionRequest { string metric_id = 1; }
message ListMetricDefinitionsRequest {
  int32 page_size = 1;
  string page_token = 2;
  experimentation.common.v1.MetricType type_filter = 3;
}
message ListMetricDefinitionsResponse {
  repeated experimentation.common.v1.MetricDefinition metrics = 1;
  string next_page_token = 2;
}

// --- Layer ---
message CreateLayerRequest { experimentation.common.v1.Layer layer = 1; }
message GetLayerRequest { string layer_id = 1; }
message GetLayerAllocationsRequest { string layer_id = 1; bool include_released = 2; }
message GetLayerAllocationsResponse { repeated experimentation.common.v1.LayerAllocation allocations = 1; }

// --- Targeting ---
message CreateTargetingRuleRequest { experimentation.common.v1.TargetingRule rule = 1; }

// --- Surrogate ---
message CreateSurrogateModelRequest { experimentation.common.v1.SurrogateModelConfig model = 1; }
message ListSurrogateModelsRequest { int32 page_size = 1; string page_token = 2; }
message ListSurrogateModelsResponse {
  repeated experimentation.common.v1.SurrogateModelConfig models = 1;
  string next_page_token = 2;
}
message GetSurrogateCalibrationRequest { string model_id = 1; }
message TriggerSurrogateRecalibrationRequest { string model_id = 1; }

// --- Portfolio Optimization (ADR-019) ---

// GetPortfolioAllocationRequest selects the scope for portfolio analysis.
// If layer_id is empty, all RUNNING experiments across all layers are included.
message GetPortfolioAllocationRequest {
  // Optional: restrict analysis to a single layer.
  string layer_id = 1;
  // Business priority overrides per experiment (1=lowest, 5=highest).
  // If an experiment_id is not present here, priority defaults to 3.
  map<string, int32> priority_overrides = 2;
}

// ConflictType describes the reason two experiments are considered conflicting.
enum ConflictType {
  CONFLICT_TYPE_UNSPECIFIED = 0;
  // Both experiments share the same primary metric in the same layer,
  // inflating the false discovery rate if analyzed jointly.
  CONFLICT_TYPE_PRIMARY_METRIC_OVERLAP = 1;
  // Experiments share a guardrail metric, creating correlated stopping rules.
  CONFLICT_TYPE_GUARDRAIL_METRIC_OVERLAP = 2;
  // Both experiments target the same user population with no targeting rule
  // separation, causing interference in measured effects.
  CONFLICT_TYPE_POPULATION_OVERLAP = 3;
}

// ExperimentConflict describes a detected conflict between two running experiments.
message ExperimentConflict {
  string experiment_id_a = 1;
  string experiment_id_b = 2;
  ConflictType conflict_type = 3;
  // Human-readable explanation of why this is a conflict.
  string rationale = 4;
}

// ExperimentAllocation contains the per-experiment portfolio recommendation.
message ExperimentAllocation {
  string experiment_id = 1;
  string experiment_name = 2;
  // Assigned business priority (1–5). Sourced from priority_overrides or default 3.
  int32 priority = 3;
  // Current bucket allocation as fraction of layer capacity (0.0–1.0).
  double current_traffic_fraction = 4;
  // Recommended fraction after priority-weighted rebalancing.
  double recommended_traffic_fraction = 5;
  // True if the experiment is underpowered at current allocation.
  // Underpowered = fewer buckets than needed to detect the minimum detectable effect.
  bool underpowered = 6;
  // Human-readable rationale for the recommendation.
  string rationale = 7;
  // Variance budget share allocated to this experiment (fraction of layer total).
  // Higher priority experiments receive proportionally more variance budget.
  double variance_budget_share = 8;
}

// PortfolioStats summarises the health of the experiment portfolio.
message PortfolioStats {
  // Total number of RUNNING experiments analysed.
  int32 running_count = 1;
  // Fraction of layer buckets occupied by at least one experiment (0.0–1.0).
  double traffic_utilization = 2;
  // Bonferroni-bound expected false discovery count given current experiment volume.
  // Computed as running_count × 0.05 (conservative; use ADR-018 e-LOND for tighter bound).
  double expected_false_discoveries = 3;
  // Number of underpowered experiments.
  int32 underpowered_count = 4;
  // Number of detected conflicts.
  int32 conflict_count = 5;
}

// GetPortfolioAllocationResponse contains the full portfolio analysis.
message GetPortfolioAllocationResponse {
  repeated ExperimentAllocation allocations = 1;
  repeated ExperimentConflict conflicts = 2;
  PortfolioStats stats = 3;
}
