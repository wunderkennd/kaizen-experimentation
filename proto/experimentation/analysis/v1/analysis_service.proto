syntax = "proto3";

package experimentation.analysis.v1;

import "google/protobuf/timestamp.proto";
import "experimentation/common/v1/experiment.proto";
import "experimentation/common/v1/lifecycle.proto";
import "experimentation/common/v1/surrogate.proto";

option go_package = "github.com/org/experimentation/gen/go/analysis/v1;analysisv1";

// AnalysisService is implemented in Rust (M4a).
// All statistical computation runs here. M6 UI reads results; never computes.
// Uses experimentation-stats crate. Fail-fast on NaN/Infinity/overflow.
service AnalysisService {
  // Run or re-run analysis for an experiment. Returns full results.
  rpc RunAnalysis(RunAnalysisRequest) returns (AnalysisResult);
  // Get latest analysis results.
  rpc GetAnalysisResult(GetAnalysisResultRequest) returns (AnalysisResult);
  // Get interleaving-specific analysis (sign test, Bradley-Terry).
  rpc GetInterleavingAnalysis(GetInterleavingAnalysisRequest) returns (InterleavingAnalysisResult);
  // Get novelty effect detection results.
  rpc GetNoveltyAnalysis(GetNoveltyAnalysisRequest) returns (NoveltyAnalysisResult);
  // Get content interference analysis.
  rpc GetInterferenceAnalysis(GetInterferenceAnalysisRequest) returns (InterferenceAnalysisResult);
  // Get synthetic control analysis for QUASI experiments (ADR-023).
  rpc GetSyntheticControlAnalysis(GetSyntheticControlAnalysisRequest) returns (SyntheticControlAnalysisResult);
  // Get switchback temporal analysis for SWITCHBACK experiments (ADR-022).
  rpc GetSwitchbackAnalysis(GetSwitchbackAnalysisRequest) returns (SwitchbackAnalysisResult);
  // Get optimal traffic allocation across a portfolio of running experiments (ADR-019).
  // Called by M5 to maximize portfolio-level information gain within a traffic budget.
  // M4a uses power curves and accumulated effect estimates for portfolio optimization.
  rpc GetPortfolioAllocation(GetPortfolioAllocationRequest) returns (GetPortfolioAllocationResponse);
}

message RunAnalysisRequest {
  string experiment_id = 1;
  // Optional: override sequential testing method for this run.
  // SEQUENTIAL_METHOD_UNSPECIFIED (default) = fixed-horizon t-test only.
  // SEQUENTIAL_METHOD_AVLM: anytime-valid LM with regression adjustment (ADR-015).
  experimentation.common.v1.SequentialMethod sequential_method = 2;
  // Mixing variance τ² for AVLM/mSPRT martingale. 0.0 = use service default (0.5).
  double tau_sq = 3;
}
message GetAnalysisResultRequest { string experiment_id = 1; }
message GetInterleavingAnalysisRequest { string experiment_id = 1; }
message GetNoveltyAnalysisRequest { string experiment_id = 1; }
message GetInterferenceAnalysisRequest { string experiment_id = 1; }
message GetSyntheticControlAnalysisRequest { string experiment_id = 1; }
message GetSwitchbackAnalysisRequest { string experiment_id = 1; }

// MetricResult contains the treatment effect estimate for one metric, one variant.
message MetricResult {
  string metric_id = 1;
  string variant_id = 2;
  double control_mean = 3;
  double treatment_mean = 4;
  double absolute_effect = 5;
  double relative_effect = 6;
  double ci_lower = 7;
  double ci_upper = 8;
  double p_value = 9;
  bool is_significant = 10;
  // CUPED-adjusted values (if covariate configured).
  double cuped_adjusted_effect = 11;
  double cuped_ci_lower = 12;
  double cuped_ci_upper = 13;
  double variance_reduction_pct = 14;
  // Sequential testing results (if configured).
  SequentialResult sequential_result = 15;
  // Per-lifecycle-segment results (if lifecycle stratification enabled).
  repeated SegmentResult segment_results = 16;
  // Session-level: both naive and clustered estimates.
  SessionLevelResult session_level_result = 17;
  // IPW-adjusted result for bandit experiments (when assignment_probability available).
  IpwResult ipw_result = 18;

  // Phase 5 extensions (ADR-018).
  // GROW martingale e-value alongside p-value. Non-negative; large values = strong evidence.
  double e_value = 19;
  // Log e-value for numerical stability when e-values are very large.
  double log_e_value = 20;
}

message SequentialResult {
  // Whether the effect has crossed the stopping boundary.
  bool boundary_crossed = 1;
  // Current alpha spent (cumulative across looks).
  double alpha_spent = 2;
  // Remaining alpha budget.
  double alpha_remaining = 3;
  // Current look number (1-indexed).
  int32 current_look = 4;
  // Adjusted p-value accounting for multiple looks.
  double adjusted_p_value = 5;
}

message SegmentResult {
  experimentation.common.v1.LifecycleSegment segment = 1;
  double effect = 2;
  double ci_lower = 3;
  double ci_upper = 4;
  double p_value = 5;
  int64 sample_size = 6;
}

message SessionLevelResult {
  double naive_se = 1;
  double clustered_se = 2;
  // Ratio of clustered variance to naive variance. Indicates design effect.
  double design_effect = 3;
  double naive_p_value = 4;
  double clustered_p_value = 5;
}

// IPW-adjusted treatment effect for bandit experiments.
// Populated when metric_summaries has an assignment_probability column.
message IpwResult {
  // IPW-adjusted treatment effect (Hájek estimator).
  double effect = 1;
  // Standard error of the IPW effect estimate (sandwich variance).
  double se = 2;
  double ci_lower = 3;
  double ci_upper = 4;
  double p_value = 5;
  // Number of observations with clipped assignment probabilities.
  int32 n_clipped = 6;
  // Kish's effective sample size (accounts for variable weighting).
  double effective_sample_size = 7;
}

// AnalysisResult is the top-level result for an experiment.
message AnalysisResult {
  string experiment_id = 1;
  repeated MetricResult metric_results = 2;
  // SRM check result.
  SrmResult srm_result = 3;
  // Surrogate projections (if surrogate model configured).
  repeated experimentation.common.v1.SurrogateProjection surrogate_projections = 4;
  // Cochran Q test for treatment effect heterogeneity across lifecycle segments.
  double cochran_q_p_value = 5;
  google.protobuf.Timestamp computed_at = 6;
}

message SrmResult {
  double chi_squared = 1;
  double p_value = 2;
  bool is_mismatch = 3;
  map<string, int64> observed_counts = 4;
  map<string, int64> expected_counts = 5;
}

// InterleavingAnalysisResult from sign test and Bradley-Terry model.
message InterleavingAnalysisResult {
  string experiment_id = 1;
  // Per-algorithm win rates from sign test.
  map<string, double> algorithm_win_rates = 2;
  double sign_test_p_value = 3;
  // Bradley-Terry strength estimates with confidence intervals.
  repeated AlgorithmStrength algorithm_strengths = 4;
  // Per-position engagement analysis.
  repeated PositionAnalysis position_analyses = 5;
  google.protobuf.Timestamp computed_at = 6;
}

message AlgorithmStrength {
  string algorithm_id = 1;
  double strength = 2;
  double ci_lower = 3;
  double ci_upper = 4;
}

message PositionAnalysis {
  int32 position = 1;
  map<string, double> algorithm_engagement_rates = 2;
}

// NoveltyAnalysisResult from exponential decay fitting.
message NoveltyAnalysisResult {
  string experiment_id = 1;
  string metric_id = 2;
  bool novelty_detected = 3;
  double raw_treatment_effect = 4;
  double projected_steady_state_effect = 5;
  double novelty_amplitude = 6;
  double decay_constant_days = 7;
  // Whether daily effect has stabilized (within 10% of steady state for 7 days).
  bool is_stabilized = 8;
  double days_until_projected_stability = 9;
  google.protobuf.Timestamp computed_at = 10;
}

// InterferenceAnalysisResult from content consumption analysis.
message InterferenceAnalysisResult {
  string experiment_id = 1;
  bool interference_detected = 2;
  double jensen_shannon_divergence = 3;
  double jaccard_similarity_top_100 = 4;
  double treatment_gini_coefficient = 5;
  double control_gini_coefficient = 6;
  double treatment_catalog_coverage = 7;
  double control_catalog_coverage = 8;
  // Titles with significant treatment/control consumption differences.
  repeated TitleSpillover spillover_titles = 9;
  google.protobuf.Timestamp computed_at = 10;

  // Phase 5 feedback loop analysis (ADR-021).
  // Whether feedback loop contamination was detected from model retraining events.
  bool feedback_loop_detected = 11;
  // Estimated bias in treatment effect due to feedback loop contamination.
  double feedback_loop_bias_estimate = 12;
  // Pearson correlation between training data contamination fraction and effect estimate
  // across retraining events. High correlation indicates feedback loop distortion.
  double contamination_effect_correlation = 13;
  google.protobuf.Timestamp feedback_loop_computed_at = 14;
}

message TitleSpillover {
  string content_id = 1;
  double treatment_watch_rate = 2;
  double control_watch_rate = 3;
  double p_value = 4;
}

// SyntheticControlAnalysisResult from quasi-experimental analysis (ADR-023).
// Produced by M4a experimentation-stats::synthetic_control module.
message SyntheticControlAnalysisResult {
  string experiment_id = 1;
  // Method used for this analysis.
  experimentation.common.v1.SyntheticControlMethod method = 2;
  // Treatment effect estimate on the outcome metric.
  double treatment_effect = 3;
  double ci_lower = 4;
  double ci_upper = 5;
  // Placebo permutation p-value. Validates that treatment effect exceeds
  // what would be observed for donor units.
  double permutation_p_value = 6;
  // Donor unit weights assigned by the SCM optimizer. Sum to 1.0, all >= 0.
  // Key: donor_unit_id, Value: weight.
  map<string, double> donor_weights = 7;
  // Pre-treatment RMSPE: root mean squared prediction error measuring fit quality.
  // Lower is better; M6 UI shows warning if RMSPE > 0.2.
  double pre_treatment_rmspe = 8;
  google.protobuf.Timestamp computed_at = 9;
}

// SwitchbackAnalysisResult from temporal alternation analysis (ADR-022).
// Produced by M4a experimentation-stats::switchback module.
message SwitchbackAnalysisResult {
  string experiment_id = 1;
  // Treatment effect estimate with HAC (Newey-West) standard errors.
  double treatment_effect = 2;
  double hac_se = 3;
  double ci_lower = 4;
  double ci_upper = 5;
  double hac_p_value = 6;
  // Randomization inference p-value.
  // Exact permutation if planned_cycles <= 20; otherwise 10K Monte Carlo.
  double ri_p_value = 7;
  // Carryover diagnostic: lag-1 autocorrelation test p-value.
  // p_value < 0.05 indicates significant carryover; extend washout period.
  double carryover_p_value = 8;
  bool carryover_detected = 9;
  google.protobuf.Timestamp computed_at = 10;
}

// GetPortfolioAllocationRequest — sent by M5 to M4a (ADR-019).
// M5 submits the set of running experiments; M4a returns optimal traffic splits.
message GetPortfolioAllocationRequest {
  // Experiment IDs to optimize allocation across. Must be non-empty.
  repeated string experiment_ids = 1;
  // Total traffic budget as a fraction [0.0, 1.0].
  // Sum of returned allocated_fraction values will be <= total_traffic_budget.
  double total_traffic_budget = 2;
}

// ExperimentAllocation is one entry in GetPortfolioAllocationResponse.
message ExperimentAllocation {
  string experiment_id = 1;
  // Optimal traffic allocation fraction for this experiment. In [0.0, 1.0].
  double allocated_fraction = 2;
  // Whether M4a estimates sufficient evidence has accumulated to conclude this experiment.
  // M5 uses this signal to trigger the CONCLUDING lifecycle transition.
  bool can_conclude = 3;
  // Estimated statistical power at the allocated traffic level and current sample size.
  // In [0.0, 1.0]. M6 UI displays this per experiment.
  double estimated_power = 4;
}

// GetPortfolioAllocationResponse — returned by M4a to M5 (ADR-019).
message GetPortfolioAllocationResponse {
  // One ExperimentAllocation per experiment_id in the request, in request order.
  repeated ExperimentAllocation allocations = 1;
  // Sum of all allocated_fraction values. Will be <= total_traffic_budget.
  double total_allocated = 2;
  google.protobuf.Timestamp computed_at = 3;
}
