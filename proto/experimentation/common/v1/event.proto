syntax = "proto3";

package experimentation.common.v1;

import "google/protobuf/timestamp.proto";
import "experimentation/common/v1/lifecycle.proto";

option go_package = "github.com/org/experimentation/gen/go/common/v1;commonv1";

// ExposureEvent records that a user was assigned and exposed to a variant.
// Published to the exposures Kafka topic by M2 Event Ingestion.
message ExposureEvent {
  string event_id = 1;
  string experiment_id = 2;
  string user_id = 3;
  string variant_id = 4;
  google.protobuf.Timestamp timestamp = 5;
  // Platform where exposure occurred.
  string platform = 6;
  // For session-level experiments: the session that triggered this exposure.
  string session_id = 7;
  // For bandit experiments: the assignment probability at exposure time.
  // Used by M4a for IPW-adjusted causal analysis.
  double assignment_probability = 8;
  // For interleaving experiments: per-item provenance mapping.
  // Key: item_id, Value: algorithm_id that contributed this item.
  map<string, string> interleaving_provenance = 9;
  // For bandit experiments: serialized context features used for arm selection.
  // Logged for offline policy evaluation and IPW computation.
  string bandit_context_json = 10;
  // Lifecycle segment at exposure time. Classified by M3 from Redis feature store.
  LifecycleSegment lifecycle_segment = 11;
  // For switchback experiments (ADR-022): the block index at exposure time.
  // Populated from GetAssignmentResponse.block_index.
  // Used by M4a to identify within-block vs cross-block observations.
  int64 switchback_block_index = 12;
}

// MetricEvent records a user action or system observation.
// Published to metric_events Kafka topic by M2 Event Ingestion.
message MetricEvent {
  string event_id = 1;
  string user_id = 2;
  // Event type identifier. Maps to metric definitions.
  // Examples: "play_start", "watch_complete", "search", "add_to_list".
  string event_type = 3;
  // Numeric value for the event (e.g., watch duration in seconds).
  double value = 4;
  // Content identifier (for content-level analysis and interference detection).
  string content_id = 5;
  string session_id = 6;
  google.protobuf.Timestamp timestamp = 7;
  // Arbitrary key-value properties for custom metric definitions.
  map<string, string> properties = 8;
}

// RewardEvent records a bandit reward observation.
// Published to reward_events Kafka topic. Consumed by M4b Policy Service.
message RewardEvent {
  string event_id = 1;
  string experiment_id = 2;
  string user_id = 3;
  string arm_id = 4;
  // Reward value. For content cold-start: play_through_rate * completion_rate.
  double reward = 5;
  google.protobuf.Timestamp timestamp = 6;
  // Context features at reward time (for contextual bandits).
  string context_json = 7;
}

// ModelRetrainingEvent is published to model_retraining_events Kafka topic
// when a recommendation model is retrained (ADR-021).
// M3 joins this with exposure data to compute training data contamination
// fractions per retraining event for feedback loop analysis in M4a.
message ModelRetrainingEvent {
  string event_id = 1;
  // Identifier of the recommendation model being retrained.
  string model_id = 2;
  // Start of training data window. Used to identify which exposures were
  // included in training data.
  google.protobuf.Timestamp training_data_start = 3;
  // End of training data window.
  google.protobuf.Timestamp training_data_end = 4;
  google.protobuf.Timestamp retrained_at = 5;
  // Experiment IDs active during the training data window.
  // Populated by M5 at retraining time for cross-reference in feedback loop analysis.
  repeated string active_experiment_ids = 6;
  // Fraction of training data containing treatment exposures [0.0, 1.0].
  // Computed post-hoc by M3 feedback loop contamination pipeline.
  double treatment_contamination_fraction = 7;
}

// GuardrailAlert is published to guardrail_alerts Kafka topic when M3
// detects a guardrail metric breach. Consumed by M5 for auto-pause.
message GuardrailAlert {
  string experiment_id = 1;
  string metric_id = 2;
  string variant_id = 3;
  double current_value = 4;
  double threshold = 5;
  // How many consecutive checks have breached.
  int32 consecutive_breach_count = 6;
  google.protobuf.Timestamp detected_at = 7;
}
