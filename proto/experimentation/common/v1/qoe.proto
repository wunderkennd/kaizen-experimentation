syntax = "proto3";

package experimentation.common.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/org/experimentation/gen/go/common/v1;commonv1";

// PlaybackMetrics captures quality-of-experience telemetry from the video player.
// Ingested via M2 IngestQoEEvent RPC; aggregated by M3 into per-user QoE metrics.
message PlaybackMetrics {
  // Time from play request to first video frame rendered.
  int64 time_to_first_frame_ms = 1;
  // Number of rebuffering events during playback.
  int32 rebuffer_count = 2;
  // Total rebuffer duration / total playback duration.
  double rebuffer_ratio = 3;
  // Mean bitrate delivered during playback.
  int32 avg_bitrate_kbps = 4;
  // Number of resolution changes during playback (ABR switches).
  int32 resolution_switches = 5;
  // Peak resolution achieved (e.g., 1080, 2160).
  int32 peak_resolution_height = 6;
  // Whether playback failed to start (1.0 = failed, 0.0 = success).
  double startup_failure_rate = 7;
  // Total playback duration in milliseconds.
  int64 playback_duration_ms = 8;
  // True if the session ended before video playback began (Exit Before Video Start).
  // Classification: playback_duration_ms == 0 AND
  //   (time_to_first_frame_ms == 0 — never reached first frame, OR
  //    time_to_first_frame_ms exceeds the configured EBVS threshold, default 10_000ms).
  // Distinct from startup_failure_rate (player crash) — EBVS is user-voluntary exit
  // during a slow start. Set by the client SDK or the HeartbeatSessionizer (#424).
  bool ebvs_detected = 9;
}

// QoEEvent is published to the qoe_events Kafka topic.
// One event per playback session per content item.
message QoEEvent {
  string event_id = 1;
  string session_id = 2;
  string content_id = 3;
  string user_id = 4;
  PlaybackMetrics metrics = 5;
  // CDN provider that served this session (for CDN experiments).
  string cdn_provider = 6;
  // ABR algorithm variant (for ABR experiments).
  string abr_algorithm = 7;
  // Encoding profile applied (for encoding experiments).
  string encoding_profile = 8;
  google.protobuf.Timestamp timestamp = 9;
}
