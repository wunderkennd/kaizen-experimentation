# ==============================================================================
# Experimentation Platform — Prometheus Alert Rules
# ==============================================================================

groups:
  # --------------------------------------------------------------------------
  # Assignment Service (M1) — SLA: <10ms p99, <2s recovery
  # --------------------------------------------------------------------------
  - name: assignment
    rules:
      - alert: AssignmentLatencyHigh
        expr: histogram_quantile(0.99, rate(assignment_request_duration_seconds_bucket[5m])) > 0.010
        for: 2m
        labels:
          severity: warning
          module: m1
        annotations:
          summary: "Assignment p99 latency above 10ms SLA"
          description: "p99 latency is {{ $value | humanizeDuration }} (target: 10ms)"

      - alert: AssignmentServiceDown
        expr: up{job="assignment-service"} == 0
        for: 30s
        labels:
          severity: critical
          module: m1
        annotations:
          summary: "Assignment service is unreachable"

      - alert: AssignmentErrorRate
        expr: rate(assignment_errors_total[5m]) / rate(assignment_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
          module: m1
        annotations:
          summary: "Assignment error rate above 1%"
          description: "Error rate: {{ $value | humanizePercentage }}"

  # --------------------------------------------------------------------------
  # Event Pipeline (M2) — SLA: <1s e2e ingestion
  # --------------------------------------------------------------------------
  - name: pipeline
    rules:
      - alert: PipelineConsumerLag
        expr: kafka_consumer_group_lag > 100000
        for: 5m
        labels:
          severity: warning
          module: m2
        annotations:
          summary: "Kafka consumer lag exceeding 100K for {{ $labels.topic }}"
          description: "Lag: {{ $value }} messages"

      - alert: PipelineIngestionSlow
        expr: histogram_quantile(0.95, rate(pipeline_ingestion_duration_seconds_bucket[5m])) > 1.0
        for: 3m
        labels:
          severity: warning
          module: m2
        annotations:
          summary: "Event ingestion p95 above 1s SLA"

      - alert: PipelineDeduplicationOverflow
        expr: pipeline_bloom_filter_false_positive_rate > 0.005
        for: 10m
        labels:
          severity: warning
          module: m2
        annotations:
          summary: "Bloom filter FPR exceeding 0.5% — consider resizing"

  # --------------------------------------------------------------------------
  # Metric Computation (M3) — SLA: daily <2h, guardrail <30min
  # --------------------------------------------------------------------------
  - name: metrics
    rules:
      - alert: MetricComputationServiceDown
        expr: up{job="metrics-service"} == 0
        for: 30s
        labels:
          severity: critical
          module: m3
        annotations:
          summary: "Metric computation service is unreachable"

      - alert: MetricJobFailureRate
        expr: sum(increase(m3_job_total{status="error"}[1h])) > 5
        labels:
          severity: warning
          module: m3
        annotations:
          summary: "Metric computation job failures increasing"
          description: "{{ $value }} job failures in the last hour"

      - alert: MetricJobDurationHigh
        expr: histogram_quantile(0.95, sum(rate(m3_job_duration_seconds_bucket[30m])) by (le, job_type)) > 300
        for: 10m
        labels:
          severity: warning
          module: m3
        annotations:
          summary: "Metric job p95 duration above 5 minutes for {{ $labels.job_type }}"
          description: "p95 duration: {{ $value | humanizeDuration }}"

      - alert: MetricRPCErrorRate
        expr: sum(rate(m3_rpc_total{status="error"}[5m])) / sum(rate(m3_rpc_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          module: m3
        annotations:
          summary: "M3 RPC error rate above 5%"
          description: "Error rate: {{ $value | humanizePercentage }}"

      - alert: SparkQuerySlow
        expr: histogram_quantile(0.95, sum(rate(m3_spark_query_duration_seconds_bucket[30m])) by (le, job_type)) > 120
        for: 10m
        labels:
          severity: warning
          module: m3
        annotations:
          summary: "Spark queries p95 above 2 minutes for {{ $labels.job_type }}"

      - alert: GuardrailBreachDetected
        expr: increase(m3_guardrail_breaches_total[1h]) > 0
        labels:
          severity: warning
          module: m3
        annotations:
          summary: "Guardrail breach detected for experiment {{ $labels.experiment_id }}"
          description: "Metric: {{ $labels.metric_id }}, action: {{ $labels.action }}"

  # --------------------------------------------------------------------------
  # Statistical Analysis (M4a) — Fail-fast on numerical issues
  # --------------------------------------------------------------------------
  - name: analysis
    rules:
      - alert: AnalysisNaNDetected
        expr: increase(analysis_nan_detected_total[1h]) > 0
        labels:
          severity: critical
          module: m4a
        annotations:
          summary: "NaN detected in statistical computation — fail-fast triggered"
          description: "Experiment: {{ $labels.experiment_id }}, metric: {{ $labels.metric_id }}"

      - alert: AnalysisSRMDetected
        expr: analysis_srm_pvalue < 0.001
        for: 0m
        labels:
          severity: critical
          module: m4a
        annotations:
          summary: "Sample Ratio Mismatch detected for experiment {{ $labels.experiment_id }}"
          description: "SRM p-value: {{ $value }} — experiment integrity compromised"

      - alert: AnalysisServiceDown
        expr: up{job="analysis-service"} == 0
        for: 30s
        labels:
          severity: critical
          module: m4a
        annotations:
          summary: "Analysis service is unreachable"

      - alert: AnalysisLatencyHigh
        expr: histogram_quantile(0.95, rate(analysis_request_duration_seconds_bucket[5m])) > 60
        for: 5m
        labels:
          severity: warning
          module: m4a
        annotations:
          summary: "Analysis p95 latency above 60s"
          description: "p95 latency: {{ $value | humanizeDuration }} (target: <60s for 1M-user experiment)"

      - alert: AnalysisErrorRate
        expr: rate(analysis_errors_total[5m]) / rate(analysis_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          module: m4a
        annotations:
          summary: "Analysis error rate above 5%"
          description: "Error rate: {{ $value | humanizePercentage }}"

  # --------------------------------------------------------------------------
  # Bandit Policy (M4b) — SLA: p99 <15ms SelectArm, <10s recovery
  # --------------------------------------------------------------------------
  - name: policy
    rules:
      - alert: PolicyUpdateStale
        expr: time() - policy_last_update_timestamp > 600
        for: 2m
        labels:
          severity: warning
          module: m4b
        annotations:
          summary: "Bandit policy hasn't updated in >10 minutes"

      - alert: PolicyServiceDown
        expr: up{job="policy-service"} == 0
        for: 30s
        labels:
          severity: critical
          module: m4b
        annotations:
          summary: "Bandit policy service is unreachable"

      - alert: PolicySelectArmLatencyHigh
        expr: histogram_quantile(0.99, rate(policy_select_arm_duration_seconds_bucket[5m])) > 0.015
        for: 2m
        labels:
          severity: critical
          module: m4b
        annotations:
          summary: "SelectArm p99 latency above 15ms SLA"
          description: "p99 latency: {{ $value | humanizeDuration }} (SLA: 15ms)"

      - alert: PolicyChannelBackpressure
        expr: policy_channel_pending / policy_channel_capacity > 0.8
        for: 1m
        labels:
          severity: warning
          module: m4b
        annotations:
          summary: "Policy channel >80% full — backpressure risk"
          description: "Pending: {{ $value | humanizePercentage }} of capacity. Consider increasing channel_depth or reducing load."

      - alert: PolicySnapshotFailed
        expr: increase(policy_snapshot_errors_total[1h]) > 0
        labels:
          severity: critical
          module: m4b
        annotations:
          summary: "RocksDB snapshot write failed"
          description: "Experiment: {{ $labels.experiment_id }}. Crash recovery data may be stale."

      - alert: PolicyErrorRate
        expr: rate(policy_errors_total[5m]) / rate(policy_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
          module: m4b
        annotations:
          summary: "Policy error rate above 1%"
          description: "Error rate: {{ $value | humanizePercentage }}"

  # --------------------------------------------------------------------------
  # Management Service (M5)
  # --------------------------------------------------------------------------
  - name: management
    rules:
      - alert: ExperimentStateTransitionFailed
        expr: increase(management_state_transition_failures_total[1h]) > 0
        labels:
          severity: warning
          module: m5
        annotations:
          summary: "Experiment state transition failure"

  # --------------------------------------------------------------------------
  # Feature Flags (M7) — SLA: <1s recovery
  # --------------------------------------------------------------------------
  - name: flags
    rules:
      - alert: FlagsServiceDown
        expr: up{job="flags-service"} == 0
        for: 15s
        labels:
          severity: critical
          module: m7
        annotations:
          summary: "Feature flag service is unreachable"

      - alert: FlagEvaluationLatencyHigh
        expr: histogram_quantile(0.99, rate(flags_evaluation_duration_seconds_bucket[5m])) > 0.005
        for: 2m
        labels:
          severity: warning
          module: m7
        annotations:
          summary: "Flag evaluation p99 above 5ms"

  # --------------------------------------------------------------------------
  # Infrastructure
  # --------------------------------------------------------------------------
  - name: infrastructure
    rules:
      - alert: KafkaBrokerDown
        expr: up{job="kafka"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kafka broker is unreachable"

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis is unreachable"

  # --------------------------------------------------------------------------
  # Guardrail Auto-Pause (ADR-008)
  # --------------------------------------------------------------------------
  - name: guardrails
    rules:
      - alert: GuardrailBreachAutoPaused
        expr: increase(guardrail_auto_pause_total[1h]) > 0
        labels:
          severity: critical
        annotations:
          summary: "Experiment {{ $labels.experiment_id }} auto-paused by guardrail breach"
          description: "Metric: {{ $labels.metric_id }}"
