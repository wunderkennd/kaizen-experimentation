# Repository settings as code.
#
# Recognized by the Probot "Settings" GitHub App (https://github.com/apps/settings)
# and by github/safe-settings. Install one of those on this repo/org to have GitHub
# apply this file automatically on every push to the default branch.
#
# Status: `delete_branch_on_merge` is ALSO enabled live via the REST API
# (PATCH /repos/{owner}/{repo}). This file is the version-controlled source of truth,
# so the setting is auditable and survives manual UI edits once an app is syncing it.
#
# Keep this file minimal: the Settings app fully manages any *section* it finds
# (e.g. adding a `branches:` block would take over branch-protection rules). List
# only what you intend to control from code.
repository:
  # Automatically delete head branches after their PRs are merged, so merged
  # branches stop accumulating on the remote (this repo had 132 such leftovers).
  delete_branch_on_merge: true
  # Required by the graduated-review model (#681, owner decision 2026-07-04):
  # routine green PRs merge automatically once required checks + Review gate
  # clear (.github/workflows/automerge.yml enables it per-PR).
  allow_auto_merge: true

# BRANCH PROTECTION MOVED (H6, 2026-07-04). The `branches:` block that lived
# here never took effect — the Settings app was never installed and main was
# still unprotected when checked live. Protection intent now lives as a native
# repository RULESET, which needs no third-party app and survives an org
# transfer with the repo:
#
#   .github/rulesets/main.json     — this repo (import via UI or one gh api call)
#   infra/github-governance/       — the same intent stamped across the whole
#                                    Kaizen fleet via Pulumi (H6), org-ready
#                                    for wunderkind-ventures
#
# The PR-lifecycle rationale (required checks, no blanket approvals, thread
# resolution, enforce-admins trade-off) is documented in those two places and
# docs/runbooks/ecosystem-governance.md. Do NOT re-add a `branches:` block —
# two write paths to the same protection would fight.
