name: Auto-promote dependents on issue close

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  promote:
    # Any sprint-* label qualifies — the closed issue's own sprint label scopes
    # the dependent scan below. (Was hardcoded to sprint-I.3; generalized so new
    # sprints don't silently lose auto-promotion.)
    if: contains(join(github.event.issue.labels.*.name, ','), 'sprint-')
    runs-on: ubuntu-latest
    steps:
      - name: Find newly-ready dependents and comment
        # SECURITY: `github.event.issue.number` is a server-validated integer
        # and contains no shell metacharacters, so direct interpolation would
        # be safe in isolation. We still route it through `env:` to follow
        # the same hardening pattern as `.github/workflows/branch-naming.yml`
        # (#579) and `.github/workflows/stub-markers.yml` (#591). Untrusted
        # `github.event.*` values must never be interpolated directly into a
        # `run:` block — they belong in `env:` so the shell receives them as
        # argv strings, not as code. See
        # https://securitylab.github.com/research/github-actions-untrusted-input/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          CLOSED_ISSUE: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ' ') }}
        run: |
          set -euo pipefail
          # Scope the dependent scan to the closed issue's own sprint label
          # (first sprint-* label wins; issues carry at most one by convention).
          SPRINT_LABEL=$(tr ' ' '\n' <<< "$ISSUE_LABELS" | grep -m1 '^sprint-' || true)
          if [ -z "$SPRINT_LABEL" ]; then
            echo "No sprint-* label on closed issue #$CLOSED_ISSUE; nothing to promote."
            exit 0
          fi
          SPRINT_NUM="${SPRINT_LABEL#sprint-}"
          # Find open same-sprint issues whose body lists the just-closed issue
          # as a blocker (under the "## Blocked by" section).
          #
          # `while … < <(jq …)` (process substitution) instead of
          # `jq … | while …`: under `set -euo pipefail`, a failure inside the
          # body of a `while` that's the last command of a pipeline does NOT
          # abort — `set -e` is suspended in pipeline-loop bodies in many
          # shells (bash included). Putting the producer on the right of `<`
          # leaves `set -e` active inside the loop, so a failed
          # `gh issue comment` (or any other command) propagates up. (Devin
          # PR #605 🚩 robustness fix.)
          while IFS= read -r dep; do
              num=$(echo "$dep" | jq -r '.number')
              body=$(echo "$dep" | jq -r '.body')
              # Re-check ALL of this dependent's blockers — only comment when
              # every blocker is now closed.
              blockers=$(echo "$body" \
                | awk '/^## Blocked by/{flag=1; next} /^## /{flag=0} flag' \
                | grep -oE '#[0-9]+' | tr -d '#' | sort -u || true)
              all_closed=true
              for b in $blockers; do
                state=$(gh issue view "$b" --json state -q '.state' 2>/dev/null || echo "MISSING")
                if [ "$state" != "CLOSED" ]; then
                  all_closed=false
                  break
                fi
              done
              if [ "$all_closed" = "true" ]; then
                gh issue comment "$num" --body "🟢 All blockers closed. This issue is now ready for dispatch — run \`just autonomous-sprint $SPRINT_NUM\` (or wait for the next scheduled run)."
              fi
            done < <(gh issue list --label "$SPRINT_LABEL" --state open --limit 200 \
              --json number,body \
            | jq -c --arg closed "#$CLOSED_ISSUE" '
                .[]
                | select(.body | test("(?ms)^## Blocked by.*?" + $closed + "\\b"))
              ')
