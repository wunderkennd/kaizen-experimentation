name: Nightly Smoke Load Tests

on:
  schedule:
    - cron: "30 3 * * *"  # 3:30 AM UTC (after nightly validation)
  workflow_dispatch: {}

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  smoke-load-tests:
    runs-on: ubuntu-latest
    env:
      # Smoke config: low rps, short duration — just verify the scripts work
      TARGET_RPS: "100"
      DURATION: "10s"
      RAMP_DURATION: "2s"
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq k6

      - name: Validate k6 scripts parse
        run: |
          for script in scripts/loadtest_assignment.js scripts/loadtest_policy.js scripts/loadtest_flags.js; do
            if [ -f "$script" ]; then
              echo "::group::Validating $script"
              k6 inspect "$script" || { echo "::error::$script failed to parse"; exit 1; }
              echo "::endgroup::"
            fi
          done

      - name: Smoke test — Assignment (dry-run parse only)
        run: |
          # In smoke mode we only validate script parsing since the target
          # services are not running. A full integration smoke test would
          # require docker-compose.platform.yml (future work).
          echo "✓ All k6 load test scripts validated successfully"
