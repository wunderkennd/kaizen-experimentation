name: Review gate

# Codifies the PR lifecycle standard (proposal §4 H3, #681):
#   draft while working → ready = "work complete" → address reviewer
#   feedback → merge.
# Reviewer-AGNOSTIC by design: the gate never requires a particular reviewer
# (Devin, claude-review, humans alike) — it requires that whatever feedback
# DID arrive is addressed before merge.
#
# This is the fleet CALLER (H6): triggers + concurrency live here; the gate
# logic lives once in _review-gate.yml so sibling repos run the identical
# check via the owner-qualified `uses:` form. Check-run context:
# "Review gate / gate" (caller job name / callee job name) — the name listed
# in .github/rulesets/main.json and the governance stack.
#
# PLATFORM CONSTRAINT: GitHub's workflow validator rejects the documented
# `pull_request_review_thread` trigger here ("Unexpected value" — verified on
# three pushes, zero-duration failed runs attributed to `push`). So the
# RESOLVE CLICK cannot re-trigger the gate. Coverage instead:
#   - push a fix              → pull_request: synchronize
#   - reply on a thread       → pull_request_review_comment: created
#   - re-review / dismissal   → pull_request_review
#   - the resolve click       → the grace window inside _review-gate.yml:
#     a blocked run keeps re-checking (default 10 min) before failing, so the
#     standard sequence (push/reply, then resolve — CONTRIBUTING.md step 5)
#     flips it green while a run is still watching. A gate left red after
#     late resolves just needs any event above or a manual re-run; the
#     failure message says exactly that (proposal §7 R1).

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  pull-requests: read

# cancel-in-progress matters twice: a newer event supersedes an older run's
# verdict AND cuts short its grace-window polling.
concurrency:
  group: review-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    # Caller half of the "Review gate / gate" check context.
    name: Review gate
    if: '!github.event.pull_request.draft'
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/_review-gate.yml
    with:
      grace-minutes: 10
