# NOT-FOR-MERGE bootstrap vehicle v2: the session's GitHub connector lost
# auth mid-ship; this one-shot workflow externalizes the follow-through the
# session cannot do directly. v2 reorders the steps — the #680/#694 drift
# diagnosis comments post FIRST (idempotency-guarded on a marker string), and
# the draft-PR create runs LAST and non-fatally, because it fails if the repo
# setting "Allow GitHub Actions to create and approve pull requests"
# (Settings → Actions → General) is off. Removed by the next push to this
# branch, which also fires pull_request:synchronize so required checks run if
# the PR exists by then (a GITHUB_TOKEN-created PR's `opened` event triggers
# nothing — probe #713).
name: vehicle-729-bootstrap
on:
  push:
    branches: [claude/harness-workflow-generalize-yywa10]
    paths: [".github/workflows/vehicle-729-bootstrap.yml"]
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR_B64: 
      C680_B64: 
      C694_B64: 
    steps:
      - name: post drift diagnosis comments (idempotent)
        run: |
          set -euo pipefail
          printf '%s' "$C680_B64" | base64 -d > /tmp/c680.md
          printf '%s' "$C694_B64" | base64 -d > /tmp/c694.md
          if gh issue view 680 --repo "$GITHUB_REPOSITORY" --json comments --jq '.comments[].body' | grep -q 'READY_DRIFT 2026-07-07 mismatch — diagnosed'; then
            echo "#680 diagnosis already posted — skip"
          else
            gh issue comment 680 --repo "$GITHUB_REPOSITORY" --body-file /tmp/c680.md
          fi
          if gh issue view 694 --repo "$GITHUB_REPOSITORY" --json comments --jq '.comments[].body' | grep -q 'Clean-window reset + updated P3 arithmetic (2026-07-07)'; then
            echo "#694 update already posted — skip"
          else
            gh issue comment 694 --repo "$GITHUB_REPOSITORY" --body-file /tmp/c694.md
          fi
      - name: open draft PR (best effort — may be blocked by Actions policy)
        run: |
          set -uo pipefail
          B="claude/harness-workflow-generalize-yywa10"
          printf '%s' "$PR_B64" | base64 -d > /tmp/pr.md
          EXISTING=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$B" --state open --json number --jq '.[].number' || true)
          if [ -n "$EXISTING" ]; then
            echo "PR already exists: #$EXISTING — skipping create"
            exit 0
          fi
          if gh pr create --repo "$GITHUB_REPOSITORY" --draft --head "$B" --base main \
              --title "fix(orchestration): exclude operator-gated issues from machine-ready sets" \
              --body-file /tmp/pr.md; then
            echo "draft PR created"
          else
            echo "::warning::gh pr create refused — likely 'Allow GitHub Actions to create and approve pull requests' is disabled; PR creation waits on the session connector re-auth"
          fi
