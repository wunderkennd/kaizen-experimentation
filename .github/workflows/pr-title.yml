name: PR title check

# Fleet CALLER (H6) — the lint body lives in _pr-title.yml so sibling repos
# enforce the identical Conventional-Commit standard. ENFORCED: the check
# FAILS on a non-conforming title, and its context ("PR title check / check")
# is a required status check in .github/rulesets/main.json (H3, #681).

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  check:
    # Caller half of the "PR title check / check" context.
    name: PR title check
    uses: ./.github/workflows/_pr-title.yml
