name: Auto-merge routine PRs

# Fleet CALLER (H6) for the graduated-review merge path (#681, owner
# 2026-07-04: "gate + queue suffices for routine green PRs") — the logic
# lives in _automerge.yml so sibling repos arm the identical machinery. See
# that file for the risk model (labels + protected paths, disarm-on-late-risk).
#
# `synchronize` matters: a later push can introduce protected paths, and a
# later `labeled` event can add risk — both must re-evaluate AND disarm an
# auto-merge that was enabled while the PR was still routine.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  automerge:
    name: auto-merge
    if: '!github.event.pull_request.draft'
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/_automerge.yml
    with:
      risk-labels: "breaking,contract-test,needs-human-input"
      risky-path-prefixes: "proto/"
