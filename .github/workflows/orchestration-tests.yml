name: Orchestration dispatch tests

# Offline behavior tests for the harness scripts — everything runs against
# stubs (no tokens, no network beyond checkout):
#   - H1 dispatch layer (claim protocol, resume semantics, executor adapters)
#   - H6 governance onboarding generator (fleet config → sibling caller
#     workflows + ruleset JSON)

on:
  pull_request:
    paths:
      - "scripts/orchestration/**"
      - "scripts/projects/migrate-blocked-by-to-dependencies.sh"
      - "scripts/generate_governance_onboarding.py"
      - "scripts/test_generate_governance_onboarding.sh"
      - "infra/github-governance/Pulumi.governance.yaml"
      - ".github/workflows/_review-gate.yml"
      - ".github/workflows/_pr-title.yml"
      - ".github/workflows/_automerge.yml"
      - ".github/workflows/orchestration-tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run dispatch behavior tests
        run: bash scripts/orchestration/test_dispatch.sh
      - name: Run governance onboarding generator tests
        run: bash scripts/test_generate_governance_onboarding.sh
      - name: Run native work-graph tests (H2)
        run: bash scripts/orchestration/test_ready_native.sh
      - name: Run evening-dispatcher tests (H4)
        run: bash scripts/orchestration/test_evening_dispatch.sh
