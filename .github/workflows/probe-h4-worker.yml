name: H4 probe worker

# Not-for-merge probe stand-in (#713, H4 amendment): the worker workflow the
# dispatcher stand-in launches via workflow_dispatch. Its only job is to prove
# the launch chain end-to-end by reporting its own run on the probe issue.
# Dies with the vehicle PR — never merges to main.

on:
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number to report the launch on"
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  worker:
    name: worker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      R: ${{ github.repository }}
      ISSUE: ${{ inputs.issue }}
    steps:
      - name: Report launch on the probe issue
        run: |
          gh issue comment --repo "$R" "$ISSUE" --body "🛰️ **Leg 1 REACHED** — worker run ${GITHUB_RUN_ID} started via workflow_dispatch on ref \`${GITHUB_REF_NAME}\` (actor: ${GITHUB_ACTOR}). A dispatcher holding only the default \`GITHUB_TOKEN\` launched this run: the documented workflow_dispatch exception holds. https://github.com/${R}/actions/runs/${GITHUB_RUN_ID}"
