name: H4 probe cleanup

# Not-for-merge (rides vehicle PR #714): closes out the H4 probe after the
# verdict landed on #713. The driving session's GitHub API token expired
# mid-bookkeeping, so the vehicle finishes its own paperwork from GitHub
# compute. Triggers once, on this file's own path; dies with the branch.

on:
  pull_request:
    paths:
      - ".github/workflows/close-h4-probe.yml"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  cleanup:
    name: cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      R: ${{ github.repository }}
    steps:
      - name: Close probe issue, record on the Goal, retire the vehicle
        run: |
          set -euo pipefail
          gh issue comment --repo "$R" 682 --body "H4 probe #713 → **PASS** ([verdict](https://github.com/$R/issues/713#issuecomment-4888053596)). Launch path confirmed with the default \`GITHUB_TOKEN\` (workflow_dispatch exception holds live); workers must be registered on \`main\` (by-filename dispatch resolves against the default branch); comment-based dispatch is dead with \`GITHUB_TOKEN\` (negative control: 0 runs). Bonus: the fallback dispatch was ready-drift.yml's first run — clean. The \`evening-dispatcher.yml\` build is unblocked."
          gh issue close --repo "$R" 713 --reason completed
          gh pr comment --repo "$R" 714 --body "Probe complete — verdict **PASS** on #713. Vehicle retires unmerged (same pattern as #705/#709/#711). This cleanup ran from the vehicle itself: the driving session's API token expired mid-bookkeeping, and the workflow-vehicle pattern covers exactly this."
          gh pr close --repo "$R" 714
