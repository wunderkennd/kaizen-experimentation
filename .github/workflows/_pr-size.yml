name: PR size (reusable)

# Enforces right-sized PRs (H3 ops follow-up, 2026-07-05). Origin: PR #684 — a
# 20-file, ~1,300-line omnibus that drew three real review findings the
# focused follow-ups (#689/#690) never did. Small diffs review better and the
# harness dispatches one issue → one PR, so oversize is usually a scoping
# smell, not a necessity.
#
#   this repo:      uses: ./.github/workflows/_pr-size.yml
#   sibling repos:  uses: wunderkennd/kaizen-experimentation/.github/workflows/_pr-size.yml@main
#
# Semantics (proposal §7 R1 — the failure carries its own remediation):
#   soft limit exceeded → warning annotation, check passes
#   hard limit exceeded → check FAILS unless the PR carries the override
#                         label (deliberate, auditable human acknowledgment)
# Exempt patterns are excluded from BOTH line and file counts: lockfiles and
# generated trees inflate diffs without adding review surface, and prose
# (*.md) reviews on content, not line count.
# Check context with the standard caller: "PR size / check".

on:
  workflow_call:
    inputs:
      soft-lines:
        type: number
        required: false
        default: 400
      hard-lines:
        type: number
        required: false
        default: 900
      soft-files:
        type: number
        required: false
        default: 10
      hard-files:
        type: number
        required: false
        default: 25
      exempt-patterns:
        description: >-
          Comma-separated. 'dir/' = path prefix, '*.ext' = extension, anything
          else matches the basename exactly.
        type: string
        required: false
        default: "go.sum,go.work.sum,package-lock.json,Cargo.lock,*.md,gen/,dist/,test-vectors/"
      override-label:
        type: string
        required: false
        default: "oversize-approved"

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Measure diff against the size gate
        uses: actions/github-script@v7
        env:
          SOFT_LINES: ${{ inputs.soft-lines }}
          HARD_LINES: ${{ inputs.hard-lines }}
          SOFT_FILES: ${{ inputs.soft-files }}
          HARD_FILES: ${{ inputs.hard-files }}
          EXEMPT_PATTERNS: ${{ inputs.exempt-patterns }}
          OVERRIDE_LABEL: ${{ inputs.override-label }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const soft = { lines: Number(process.env.SOFT_LINES), files: Number(process.env.SOFT_FILES) };
            const hard = { lines: Number(process.env.HARD_LINES), files: Number(process.env.HARD_FILES) };
            const overrideLabel = process.env.OVERRIDE_LABEL;
            const patterns = process.env.EXEMPT_PATTERNS.split(',').map(s => s.trim()).filter(Boolean);

            const exempt = (path) => patterns.some(p => {
              if (p.endsWith('/')) return path.startsWith(p) || path.includes('/' + p);
              if (p.startsWith('*.')) return path.endsWith(p.slice(1));
              return path.split('/').pop() === p;
            });

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const counted = files.filter(f => !exempt(f.filename));
            const lines = counted.reduce((n, f) => n + f.additions + f.deletions, 0);
            const nFiles = counted.length;
            const nExempt = files.length - nFiles;
            const summary =
              `${lines} changed lines across ${nFiles} counted files` +
              (nExempt ? ` (+${nExempt} exempt: lockfiles/generated/markdown)` : '') +
              ` — soft ${soft.lines}/${soft.files}, hard ${hard.lines}/${hard.files}`;

            const overHard = lines > hard.lines || nFiles > hard.files;
            const overSoft = lines > soft.lines || nFiles > soft.files;
            const hasOverride = pr.labels.some(l => l.name === overrideLabel);

            if (overHard && hasOverride) {
              core.notice(`Oversize APPROVED via '${overrideLabel}' label: ${summary}. ` +
                `The approval should be justified in a PR comment.`);
              return;
            }
            if (overHard) {
              core.error(
                `PR exceeds the hard size gate: ${summary}.\n` +
                `Split it — the harness dispatches one issue per PR, so oversize usually means the ` +
                `issue scoped more than one unit of work: deliver the first coherent slice, note the ` +
                `remainder on the issue (or file a follow-up), and keep each PR under the soft limit. ` +
                `If this diff is genuinely atomic (codegen, vendored update, mechanical migration), add ` +
                `the '${overrideLabel}' label with a justifying comment and this check turns green. ` +
                `Policy: CONTRIBUTING.md § Pull Request Process.`);
              core.setFailed(`PR size: ${lines} lines / ${nFiles} files exceeds hard limit (${hard.lines} lines / ${hard.files} files).`);
              return;
            }
            if (overSoft) {
              core.warning(`PR is above the soft size gate: ${summary}. It still passes — but consider ` +
                `whether a split would review better (PR #684 vs #689/#690 is the house case study).`);
              return;
            }
            core.info(`PR size OK: ${summary}.`);
