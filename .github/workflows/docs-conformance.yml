name: Docs conformance

# Advisory lints for the delivery-lifecycle artifacts (H7 #699 PR-3):
# ADR headers, plan v2 sections (grandfathered before 2026-07-05),
# Cross-phase tables on multi-phase plans, PRD one-metric rule, template
# frontmatter. Default mode fails ONLY on post-cutover structural errors;
# legacy gaps surface as warnings. DOCS_LINT_STRICT=1 escalates — promotion
# to a required check follows the verify-then-require ratchet
# (docs/guides/delivery-lifecycle.md).

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/check_docs.py"
      - "scripts/test_check_docs.sh"
      - ".github/workflows/docs-conformance.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML (frontmatter parsing; script degrades without it)
        run: pip install pyyaml
      - name: Delivery-lifecycle docs conformance
        run: python3 scripts/check_docs.py .
      - name: Lint self-test
        run: bash scripts/test_check_docs.sh
