name: Weekly Chaos Engineering

on:
  schedule:
    - cron: "0 2 * * 0"  # Sunday 2 AM UTC
  workflow_dispatch: {}

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  chaos:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy to staging
        run: ./scripts/deploy_staging.sh

      - name: Chaos — Kill M1 Assignment under load
        run: ./scripts/chaos_kill_assignment.sh
        # Verifies: recovery < 2 seconds, no incorrect assignments

      - name: Chaos — Kill M4b Policy under load
        run: ./scripts/chaos_kill_policy.sh
        # Verifies: recovery < 10 seconds, RocksDB snapshot restore, policy state persistence

      - name: Chaos — Kill M4a Analysis under load
        run: ./scripts/chaos_test_analysis.sh
        # Verifies: recovery < 2 seconds, all 5 RPCs functional (stateless)

      - name: Chaos — Kill M2 Pipeline under load
        run: ./scripts/chaos_kill_ingestion.sh
        # Verifies: recovery < 1 second, no data loss (Kafka idempotent producer)

      - name: Verify data integrity
        run: ./scripts/chaos_verify_integrity.sh

      - name: Chaos — Multi-service E2E framework
        run: ./scripts/chaos_e2e_framework.sh --services pipeline,analysis,policy
        # Verifies: sequential kill/recovery of all services under sustained multi-event load
