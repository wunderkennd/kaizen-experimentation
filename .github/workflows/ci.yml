name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash -euo pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────── Stage 0: Detect Changes ─────────
  # Produces boolean outputs that downstream language jobs gate on, so a
  # docs-only PR does not trigger 25-minute Rust or Go runs. Anything
  # touching ci.yml itself triggers all jobs (catch self-changes safely).
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'proto/**'
              - '.github/workflows/ci.yml'
            go:
              - 'services/**'
              - 'proto/**'
              - '.github/workflows/ci.yml'

  # ───────── Stage 1: Schema Validation ─────────
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "latest"
          buf_user: ${{ secrets.BUF_USER }}
          buf_api_token: ${{ secrets.BUF_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint proto
        run: cd proto && buf lint

      - name: Check breaking changes
        if: github.event_name == 'pull_request'
        working-directory: proto
        env:
          BUF_INPUT_HTTPS_USERNAME: ${{ secrets.BUF_USER }}
          BUF_INPUT_HTTPS_PASSWORD: ${{ secrets.KAIZEN_PAT }}
        run: buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=main,subdir=proto'

      - name: Generate code
        run: |
          cd proto && buf generate
          test -d gen || { echo "::error::buf generate did not produce proto/gen/"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: proto/gen/

  # ───────── Stage 2: Rust Build & Test ─────────
  rust:
    runs-on: ubuntu-latest
    needs: [changes, schema]
    if: needs.changes.outputs.rust == 'true'
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.4

      - name: Cache Rust build artifacts (including C++ native deps)
        uses: actions/cache@v4
        with:
          path: |
            target/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler libcurl4-openssl-dev libssl-dev pkg-config

      - name: Ensure sccache is working
        run: |
          if ! sccache --start-server 2>/dev/null; then
            echo "::warning::sccache server failed to start; disabling RUSTC_WRAPPER"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          elif ! echo 'fn main(){}' | RUSTC_WRAPPER=sccache rustc --edition 2021 - -o /dev/null 2>/dev/null; then
            echo "::warning::sccache cannot wrap rustc; disabling RUSTC_WRAPPER"
            sccache --stop-server 2>/dev/null || true
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          fi

      - name: Clippy (all features, excluding gpu)
        run: |
          # The gpu feature (tch/libtorch) requires a local PyTorch install.
          # Check all other crates with --all-features, then bandit with default features only.
          cargo clippy --workspace --exclude experimentation-bandit --all-features -- -D warnings
          cargo clippy --package experimentation-bandit -- -D warnings

      - name: Unit tests
        run: cargo test --workspace

      - name: Hash determinism vectors
        run: cargo test --package experimentation-hash -- hash_vectors

      - name: Property tests (stats)
        run: cargo test --package experimentation-stats --features simd
        timeout-minutes: 15

      - name: WASM build
        run: cargo build --package experimentation-hash --target wasm32-unknown-unknown --features wasm

      - name: WASM test vectors (10K via wasm-pack)
        timeout-minutes: 20
        working-directory: crates/experimentation-hash
        run: |
          cargo install wasm-pack --locked
          wasm-pack test --node --features wasm

  # ───────── Stage 3: Go Build & Test ─────────
  go:
    runs-on: ubuntu-latest
    needs: [changes, schema, rust]
    # Run when go/proto changed. The always() guard lets this proceed even
    # when `rust` is skipped (rust files unchanged) — schema must succeed
    # because go downloads its proto/gen/ artifact.
    if: |
      always() &&
      needs.changes.outputs.go == 'true' &&
      needs.schema.result == 'success' &&
      (needs.rust.result == 'success' || needs.rust.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: services/go.sum

      - uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: gen/

      - name: Create gen/go module files
        run: |
          cat > gen/go/go.mod << 'GOMOD'
          module github.com/org/experimentation/gen/go

          go 1.26

          require (
          	connectrpc.com/connect v1.17.0
          	google.golang.org/protobuf v1.35.0
          )

          require (
          	github.com/google/go-cmp v0.6.0 // indirect
          	golang.org/x/net v0.29.0 // indirect
          )
          GOMOD
          cd gen/go && go mod download

      - name: Vet
        working-directory: services
        run: go vet ./...

      - name: Unit tests
        working-directory: services
        run: |
          # Exclude /cmd packages from coverage — they contain only main() with no
          # test files, which causes "go: no such tool covdata" on Go 1.22 runners.
          PKGS=$(go list ./... | grep -v '/cmd$')
          go test -race -cover $PKGS

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Integration tests
        working-directory: services
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/debug
        run: |
          docker compose -f ../docker-compose.test.yml up -d --wait || {
            echo "::error::docker compose up failed — dumping container logs"
            docker compose -f ../docker-compose.test.yml logs
            exit 1
          }

          # Schema migrations and seed data are applied inside the postgres
          # container via docker-entrypoint-initdb.d (see docker-compose.test.yml
          # volume mounts and scripts/init-test-db.sh).

          test_exit=0
          CGO_ENABLED=1 go test -tags=integration -race -timeout 2m ./... || test_exit=$?
          docker compose -f ../docker-compose.test.yml down
          exit $test_exit

  # ───────── Stage 3b: Infrastructure Tests ─────────
  infra:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: infra/go.sum

      - name: Unit tests
        working-directory: infra
        run: go test -race -count=1 -timeout=3m ./pkg/... ./test/...

  # ───────── Stage 4: TypeScript Build & Test ─────────
  typescript:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - name: Ensure lockfile exists for cache key
        run: |
          if [ ! -f ui/package-lock.json ]; then
            echo "package-lock.json missing; generating from package.json"
            cd ui && npm install --package-lock-only
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: gen/

      - name: Install
        working-directory: ui
        run: npm ci

      - name: Lint
        working-directory: ui
        run: npm run lint

      - name: Type check
        working-directory: ui
        run: npm run type-check

      - name: Test
        working-directory: ui
        run: npm run test -- --run

      - name: Build
        working-directory: ui
        run: npm run build

  # ───────── Stage 5: Cross-Language Hash Parity ─────────
  hash-parity:
    runs-on: ubuntu-latest
    needs: [rust, go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify hash parity (10,000 vectors)
        run: python scripts/verify_hash_parity.py

  # ───────── Stage 6: Docker Build + Dual-Push (main only) ─────────
  #
  # Builds each service image once (multi-arch: linux/amd64 + linux/arm64) and
  # pushes the resulting tag/digest to BOTH AWS ECR and GCP Artifact Registry
  # in parallel within the same buildx invocation. Both registries end up with
  # an identical OCI manifest digest, so a Cloud Run service pulling from AR
  # and an ECS task pulling from ECR resolve to the same bytes.
  #
  # Auth model:
  #   - AWS: GitHub OIDC → role assumption (`aws-actions/configure-aws-credentials`)
  #   - GCP: GitHub OIDC → Workload Identity Federation (`google-github-actions/auth`)
  #
  # If any of the three required secrets/vars are missing, the corresponding
  # registry login is skipped and the job emits a warning rather than failing
  # outright. This lets the pipeline keep working during phased rollout (e.g.
  # before the GCP WIP is provisioned in a fork).
  docker:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [rust, go, typescript, hash-parity, infra]
    permissions:
      id-token: write    # required for OIDC to AWS + GCP
      contents: read
    strategy:
      fail-fast: false   # one failing image shouldn't block the others
      matrix:
        service:
          - { name: assignment, path: crates/experimentation-assignment }
          - { name: pipeline, path: crates/experimentation-pipeline }
          - { name: analysis, path: crates/experimentation-analysis }
          - { name: policy, path: crates/experimentation-policy }
          - { name: management, path: services/management }
          - { name: metrics, path: services/metrics }
          - { name: ui, path: ui }
    env:
      # Image coordinates, kept as env so the build/push step is one shell
      # block instead of branching across multiple step languages.
      IMAGE_NAME: kaizen-${{ matrix.service.name }}
      IMAGE_TAG: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Download generated proto code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: gen/

      - name: Create gen/go module file
        run: |
          cat > gen/go/go.mod << 'GOMOD'
          module github.com/org/experimentation/gen/go

          go 1.26

          require (
          	connectrpc.com/connect v1.17.0
          	google.golang.org/protobuf v1.35.0
          )

          require (
          	github.com/google/go-cmp v0.6.0 // indirect
          	golang.org/x/net v0.29.0 // indirect
          )
          GOMOD

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── AWS auth (OIDC) ────────────────────────────────────────────────
      - name: Configure AWS credentials
        id: aws-auth
        if: vars.AWS_DEPLOY_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: ecr-login
        if: steps.aws-auth.outcome == 'success'
        uses: aws-actions/amazon-ecr-login@v2

      # ── GCP auth (OIDC via Workload Identity Federation) ───────────────
      - name: Authenticate to Google Cloud
        id: gcp-auth
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_CI_PUSH_SA != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_PUSH_SA }}

      - name: Login to Google Artifact Registry
        if: steps.gcp-auth.outcome == 'success'
        uses: docker/login-action@v3
        with:
          # Default to "us" multi-region (matches Pulumi.gcp-dev.yaml's
          # gcpArLocation). Override via vars.GCP_AR_LOCATION if a specific
          # region is needed (e.g. data residency).
          registry: ${{ vars.GCP_AR_LOCATION || 'us' }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      # ── Compose dual-tag list, build once, push to both ───────────────
      - name: Compute image tags
        id: tags
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          GCP_AR_LOCATION: ${{ vars.GCP_AR_LOCATION || 'us' }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          tags=()
          if [ -n "${ECR_REGISTRY:-}" ]; then
            tags+=("${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}")
            tags+=("${ECR_REGISTRY}/${IMAGE_NAME}:latest")
          fi
          if [ -n "${GCP_PROJECT_ID:-}" ] && [ "${{ steps.gcp-auth.outcome }}" = "success" ]; then
            ar_repo="${GCP_AR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${IMAGE_NAME}"
            tags+=("${ar_repo}:${IMAGE_TAG}")
            tags+=("${ar_repo}:latest")
          fi
          if [ ${#tags[@]} -eq 0 ]; then
            echo "::warning::No registries configured (neither AWS_DEPLOY_ROLE_ARN nor GCP_PROJECT_ID set). Building without push."
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "tags=experimentation/${{ matrix.service.name }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "push=true" >> "$GITHUB_OUTPUT"
            # Comma-separated, the format docker/build-push-action expects.
            ( IFS=, ; echo "tags=${tags[*]}" ) >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push (multi-arch, multi-registry)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.path }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.tags.outputs.push == 'true' }}
          tags: ${{ steps.tags.outputs.tags }}
          # Provenance + SBOM attestations land on the manifest in BOTH
          # registries since buildx pushes the same OCI manifest object.
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Verify both registries received the same digest ───────────────
      - name: Verify cross-registry digest parity
        if: steps.tags.outputs.push == 'true' && steps.ecr-login.outcome == 'success' && steps.gcp-auth.outcome == 'success'
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          GCP_AR_LOCATION: ${{ vars.GCP_AR_LOCATION || 'us' }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          ecr_ref="${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          ar_ref="${GCP_AR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${IMAGE_NAME}:${IMAGE_TAG}"

          # `docker buildx imagetools inspect` emits the manifest digest in a
          # single "Digest:" line. Equality across the two registries is the
          # acceptance criterion — anything else means a divergent push and
          # downstream services on AWS vs GCP would silently see different
          # bytes.
          ecr_digest=$(docker buildx imagetools inspect "${ecr_ref}" | awk '/^Digest:/ { print $2; exit }')
          ar_digest=$(docker buildx imagetools inspect "${ar_ref}"  | awk '/^Digest:/ { print $2; exit }')
          echo "ECR digest: ${ecr_digest}"
          echo "AR  digest: ${ar_digest}"
          if [ -z "${ecr_digest}" ] || [ -z "${ar_digest}" ]; then
            echo "::error::Failed to read digest from one or both registries"
            exit 1
          fi
          if [ "${ecr_digest}" != "${ar_digest}" ]; then
            echo "::error::Digest mismatch between ECR and Artifact Registry"
            exit 1
          fi
          echo "✓ ECR and Artifact Registry resolved to identical digest"
