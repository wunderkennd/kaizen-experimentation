name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash -euo pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────── Stage 1: Schema Validation ─────────
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "latest"
          buf_user: ${{ secrets.BUF_USER }}
          buf_api_token: ${{ secrets.BUF_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint proto
        run: cd proto && buf lint

      - name: Check breaking changes
        if: github.event_name == 'pull_request'
        working-directory: proto
        env:
          BUF_INPUT_HTTPS_USERNAME: ${{ secrets.BUF_USER }}
          BUF_INPUT_HTTPS_PASSWORD: ${{ secrets.KAIZEN_PAT }}
        run: buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=main,subdir=proto'

      - name: Generate code
        run: |
          cd proto && buf generate
          test -d gen || { echo "::error::buf generate did not produce proto/gen/"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: proto/gen/

  # ───────── Stage 2: Rust Build & Test ─────────
  rust:
    runs-on: ubuntu-latest
    needs: schema
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.4

      - name: Cache Rust build artifacts (including C++ native deps)
        uses: actions/cache@v4
        with:
          path: |
            target/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler libcurl4-openssl-dev libssl-dev pkg-config

      - name: Ensure sccache is working
        run: |
          if ! sccache --start-server 2>/dev/null; then
            echo "::warning::sccache server failed to start; disabling RUSTC_WRAPPER"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          elif ! echo 'fn main(){}' | RUSTC_WRAPPER=sccache rustc --edition 2021 - -o /dev/null 2>/dev/null; then
            echo "::warning::sccache cannot wrap rustc; disabling RUSTC_WRAPPER"
            sccache --stop-server 2>/dev/null || true
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          fi

      - name: Clippy (all features, excluding gpu)
        run: |
          # The gpu feature (tch/libtorch) requires a local PyTorch install.
          # Check all other crates with --all-features, then bandit with default features only.
          cargo clippy --workspace --exclude experimentation-bandit --all-features -- -D warnings
          cargo clippy --package experimentation-bandit -- -D warnings

      - name: Unit tests
        run: cargo test --workspace

      - name: Hash determinism vectors
        run: cargo test --package experimentation-hash -- hash_vectors

      - name: Property tests (stats)
        run: cargo test --package experimentation-stats --features simd
        timeout-minutes: 15

      - name: WASM build
        run: cargo build --package experimentation-hash --target wasm32-unknown-unknown --features wasm

      - name: WASM test vectors (10K via wasm-pack)
        timeout-minutes: 20
        working-directory: crates/experimentation-hash
        run: |
          cargo install wasm-pack --locked
          wasm-pack test --node --features wasm

  # ───────── Stage 3: Go Build & Test ─────────
  go:
    runs-on: ubuntu-latest
    needs: [schema, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: services/go.sum

      - uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: gen/

      - name: Create gen/go module files
        run: |
          cat > gen/go/go.mod << 'GOMOD'
          module github.com/org/experimentation/gen/go

          go 1.26

          require (
          	connectrpc.com/connect v1.17.0
          	google.golang.org/protobuf v1.35.0
          )

          require (
          	github.com/google/go-cmp v0.6.0 // indirect
          	golang.org/x/net v0.29.0 // indirect
          )
          GOMOD
          cd gen/go && go mod download

      - name: Vet
        working-directory: services
        run: go vet ./...

      - name: Unit tests
        working-directory: services
        run: |
          # Exclude /cmd packages from coverage — they contain only main() with no
          # test files, which causes "go: no such tool covdata" on Go 1.22 runners.
          PKGS=$(go list ./... | grep -v '/cmd$')
          go test -race -cover $PKGS

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Integration tests
        working-directory: services
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/debug
        run: |
          docker compose -f ../docker-compose.test.yml up -d --wait || {
            echo "::error::docker compose up failed — dumping container logs"
            docker compose -f ../docker-compose.test.yml logs
            exit 1
          }

          # Schema migrations and seed data are applied inside the postgres
          # container via docker-entrypoint-initdb.d (see docker-compose.test.yml
          # volume mounts and scripts/init-test-db.sh).

          test_exit=0
          CGO_ENABLED=1 go test -tags=integration -race -timeout 2m ./... || test_exit=$?
          docker compose -f ../docker-compose.test.yml down
          exit $test_exit

  # ───────── Stage 4: TypeScript Build & Test ─────────
  typescript:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - name: Ensure lockfile exists for cache key
        run: |
          if [ ! -f ui/package-lock.json ]; then
            echo "package-lock.json missing; generating from package.json"
            cd ui && npm install --package-lock-only
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: gen/

      - name: Install
        working-directory: ui
        run: npm ci

      - name: Lint
        working-directory: ui
        run: npm run lint

      - name: Type check
        working-directory: ui
        run: npm run type-check

      - name: Test
        working-directory: ui
        run: npm run test -- --run

      - name: Build
        working-directory: ui
        run: npm run build

  # ───────── Stage 5: Cross-Language Hash Parity ─────────
  hash-parity:
    runs-on: ubuntu-latest
    needs: [rust, go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify hash parity (10,000 vectors)
        run: python scripts/verify_hash_parity.py

  # ───────── Stage 6: Docker Build (main only) ─────────
  docker:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [rust, go, typescript, hash-parity]
    strategy:
      matrix:
        service:
          - { name: assignment, path: crates/experimentation-assignment }
          - { name: pipeline, path: crates/experimentation-pipeline }
          - { name: analysis, path: crates/experimentation-analysis }
          - { name: policy, path: crates/experimentation-policy }
          - { name: management, path: services/management }
          - { name: metrics, path: services/metrics }
          - { name: ui, path: ui }
    steps:
      - uses: actions/checkout@v4

      - name: Download generated proto code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: gen/

      - name: Create gen/go module file
        run: |
          cat > gen/go/go.mod << 'GOMOD'
          module github.com/org/experimentation/gen/go

          go 1.26

          require (
          	connectrpc.com/connect v1.17.0
          	google.golang.org/protobuf v1.35.0
          )

          require (
          	github.com/google/go-cmp v0.6.0 // indirect
          	golang.org/x/net v0.29.0 // indirect
          )
          GOMOD

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -f ${{ matrix.service.path }}/Dockerfile \
            -t experimentation/${{ matrix.service.name }}:${{ github.sha }} \
            .
