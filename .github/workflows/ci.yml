name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger — needed because auto-merges performed by the automerge
  # workflow's GITHUB_TOKEN do not fire `push` events (GitHub suppresses
  # workflow-triggered triggers), so post-merge main CI (and the ECR image
  # push) silently never ran for auto-merged PRs.
  workflow_dispatch:

defaults:
  run:
    shell: bash -euo pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────── Stage 0: Detect Changes ─────────
  # Produces boolean outputs that downstream language jobs gate on, so a
  # docs-only PR does not trigger 25-minute Rust or Go runs. Anything
  # touching ci.yml itself triggers all jobs (catch self-changes safely).
  changes:
    runs-on: ubuntu-latest
    outputs:
      # workflow_dispatch means "run the full pipeline": paths-filter can't
      # diff a dispatch event (no base), so short-circuit to true instead of
      # letting the step error and paint the run red.
      rust: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.rust }}
      go: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - '!crates/**/*.md'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'proto/**'
              - '.github/workflows/ci.yml'
            go:
              - 'services/**'
              - '!services/**/*.md'
              - 'proto/**'
              - '.github/workflows/ci.yml'

  # ───────── Stage 1: Schema Validation ─────────
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "latest"
          buf_api_token: ${{ secrets.BUF_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint proto
        run: cd proto && buf lint

      - name: Check breaking changes
        if: github.event_name == 'pull_request'
        working-directory: proto
        env:
          BUF_INPUT_HTTPS_USERNAME: ${{ secrets.BUF_USER }}
          BUF_INPUT_HTTPS_PASSWORD: ${{ secrets.KAIZEN_PAT }}
        run: buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=main,subdir=proto'

      - name: Generate code
        run: |
          cd proto && buf generate
          test -d gen || { echo "::error::buf generate did not produce proto/gen/"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: proto/gen/

  # ───────── Stage 2: Rust Build & Test ─────────
  #
  # Split into three parallel jobs along feature-set boundaries. Cargo does
  # not share artifacts across feature resolutions, so one job used to
  # accumulate five distinct builds (--all-features clippy, default tests,
  # simd, connectrpc, wasm) in a single target/ and intermittently exhausted
  # runner disk (os error 28). Separate runners give each build its own disk
  # and cut wall-clock to the slowest job instead of the sum.
  #
  # Caching: only `rust` (core) persists target/ in the actions cache — three
  # target/ caches would thrash the 10GB repo cache budget and evict each
  # other into permanent cold starts. The feature/wasm jobs cache just the
  # cargo registry and rely on sccache (GHA backend, shared across all three
  # jobs) for compiled dependencies.
  rust:
    runs-on: ubuntu-latest
    needs: [changes, schema]
    if: needs.changes.outputs.rust == 'true'
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.4

      - name: Cache Rust build artifacts (including C++ native deps)
        uses: actions/cache@v4
        with:
          path: |
            target/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler libcurl4-openssl-dev libssl-dev pkg-config

      - name: Ensure sccache is working
        run: |
          if ! sccache --start-server 2>/dev/null; then
            echo "::warning::sccache server failed to start; disabling RUSTC_WRAPPER"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          elif ! echo 'fn main(){}' | RUSTC_WRAPPER=sccache rustc --edition 2021 - -o /dev/null 2>/dev/null; then
            echo "::warning::sccache cannot wrap rustc; disabling RUSTC_WRAPPER"
            sccache --stop-server 2>/dev/null || true
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          fi

      - name: Clippy (all features, excluding gpu)
        run: |
          # The gpu feature (tch/libtorch) requires a local PyTorch install.
          # Check all other crates with --all-features, then bandit with default features only.
          cargo clippy --workspace --exclude experimentation-bandit --all-features -- -D warnings
          cargo clippy --package experimentation-bandit -- -D warnings

      - name: Unit tests
        run: cargo test --workspace

      - name: Hash determinism vectors
        run: cargo test --package experimentation-hash -- hash_vectors

  # Opt-in feature trees (simd proptests, ADR-031 connectrpc pilot). These
  # build feature resolutions the core job never produces, so they gain
  # nothing from its target/ cache — sccache covers the shared dependencies.
  rust-features:
    runs-on: ubuntu-latest
    needs: [changes, schema]
    if: needs.changes.outputs.rust == 'true'
    timeout-minutes: 30
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@v0.0.4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler libcurl4-openssl-dev libssl-dev pkg-config

      - name: Ensure sccache is working
        run: |
          if ! sccache --start-server 2>/dev/null; then
            echo "::warning::sccache server failed to start; disabling RUSTC_WRAPPER"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          elif ! echo 'fn main(){}' | RUSTC_WRAPPER=sccache rustc --edition 2021 - -o /dev/null 2>/dev/null; then
            echo "::warning::sccache cannot wrap rustc; disabling RUSTC_WRAPPER"
            sccache --stop-server 2>/dev/null || true
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          fi

      - name: Property tests (stats)
        run: cargo test --package experimentation-stats --features simd
        timeout-minutes: 15

      - name: ADR-031 pilot — assignment connectrpc feature
        run: cargo test --package experimentation-assignment --features connectrpc
        timeout-minutes: 15

  # wasm32 is a different compilation target entirely — nothing in target/
  # from the host jobs applies. ~/.cargo/bin/wasm-pack is cached so the
  # install below is a fast no-op instead of a multi-minute compile per run.
  rust-wasm:
    runs-on: ubuntu-latest
    needs: [changes, schema]
    if: needs.changes.outputs.rust == 'true'
    timeout-minutes: 30
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: mozilla-actions/sccache-action@v0.0.4

      - name: Cache cargo registry and wasm-pack
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/bin/wasm-pack
          key: cargo-wasm-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-wasm-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler libcurl4-openssl-dev libssl-dev pkg-config

      - name: Ensure sccache is working
        run: |
          if ! sccache --start-server 2>/dev/null; then
            echo "::warning::sccache server failed to start; disabling RUSTC_WRAPPER"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          elif ! echo 'fn main(){}' | RUSTC_WRAPPER=sccache rustc --edition 2021 - -o /dev/null 2>/dev/null; then
            echo "::warning::sccache cannot wrap rustc; disabling RUSTC_WRAPPER"
            sccache --stop-server 2>/dev/null || true
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          fi

      - name: WASM build
        run: cargo build --package experimentation-hash --target wasm32-unknown-unknown --features wasm

      - name: WASM test vectors (10K via wasm-pack)
        timeout-minutes: 20
        working-directory: crates/experimentation-hash
        run: |
          command -v wasm-pack >/dev/null || cargo install wasm-pack --locked
          wasm-pack test --node --features wasm

  # ───────── Stage 3: Go Build & Test ─────────
  go:
    runs-on: ubuntu-latest
    needs: [changes, schema, rust]
    # Run when go/proto changed. The always() guard lets this proceed even
    # when `rust` is skipped (rust files unchanged) — schema must succeed
    # because go downloads its proto/gen/ artifact.
    if: |
      always() &&
      needs.changes.outputs.go == 'true' &&
      needs.schema.result == 'success' &&
      (needs.rust.result == 'success' || needs.rust.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: services/go.sum

      - uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: gen/

      # gen/go/go.mod and go.sum are TRACKED files; the artifact contains only
      # generated .go sources and overlays them without touching the module
      # files. (A heredoc used to overwrite go.mod here with drifted contents —
      # a `go 1.26` directive that broke module-mode docker builds against
      # services' `go 1.25.0`. See #676.)

      # Docker image builds copy services/ + gen/go/ without go.work, so they
      # resolve in MODULE mode. Workspace mode (go.work) can satisfy imports
      # the module graph can't, silently masking image-build breakage — this
      # check fails the job instead. See #676.
      - name: Module-mode tidy check (docker builds run without go.work)
        working-directory: services
        env:
          GOWORK: "off"
        run: go mod tidy -diff

      - name: Vet
        working-directory: services
        run: go vet ./...

      - name: Unit tests
        working-directory: services
        run: |
          # Exclude /cmd packages from coverage — they contain only main() with no
          # test files, which causes "go: no such tool covdata" on Go 1.22 runners.
          PKGS=$(go list ./... | grep -v '/cmd$')
          go test -race -cover $PKGS

      # Authenticates the postgres:16-alpine pull (docker-compose.test.yml) to
      # dodge Docker Hub anonymous rate limits. Two layers of resilience:
      #   - `if:` skips the step on fork PRs, where secrets are unavailable
      #     anyway (no broad env exposure needed — creds stay scoped to this
      #     step's `with:`, never reaching the integration-test step's env).
      #   - `continue-on-error` keeps an expired/invalid token on a trunk run
      #     from hard-failing the job — it degrades to anonymous pulls. (An
      #     expired token can't be detected up front, which is why this — not
      #     the `if:` — is what makes the job resilient to the #609 failure.)
      - name: Login to Docker Hub
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Integration tests
        working-directory: services
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/debug
        run: |
          docker compose -f ../docker-compose.test.yml up -d --wait || {
            echo "::error::docker compose up failed — dumping container logs"
            docker compose -f ../docker-compose.test.yml logs
            exit 1
          }

          # Schema migrations and seed data are applied inside the postgres
          # container via docker-entrypoint-initdb.d (see docker-compose.test.yml
          # volume mounts and scripts/init-test-db.sh).

          test_exit=0
          CGO_ENABLED=1 go test -tags=integration -race -timeout 2m ./... || test_exit=$?
          docker compose -f ../docker-compose.test.yml down -v
          exit $test_exit

  # ───────── Stage 3b: Infrastructure Tests ─────────
  infra:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: |
            infra/go.sum
            infra/github-governance/go.sum

      - name: Unit tests
        working-directory: infra
        run: go test -race -count=1 -timeout=3m ./pkg/... ./test/...

      # Nested module — excluded from the parent's ./... patterns above.
      - name: GitHub governance stack tests (H6)
        working-directory: infra/github-governance
        run: go test -race -count=1 -timeout=3m ./...

  # ───────── Stage 4: TypeScript Build & Test ─────────
  typescript:
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - name: Ensure lockfile exists for cache key
        run: |
          if [ ! -f ui/package-lock.json ]; then
            echo "package-lock.json missing; generating from package.json"
            cd ui && npm install --package-lock-only
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: gen/

      - name: Install
        working-directory: ui
        run: npm ci

      - name: Lint
        working-directory: ui
        run: npm run lint

      - name: Type check
        working-directory: ui
        run: npm run type-check

      - name: Test
        working-directory: ui
        run: npm run test -- --run

      - name: Build
        working-directory: ui
        run: npm run build

  # ───────── Stage 5: Cross-Language Hash Parity ─────────
  hash-parity:
    runs-on: ubuntu-latest
    needs: [rust, go]
    # The script is self-contained (no build artifacts needed), so run it even
    # when the path filter skipped rust/go — a skipped dependency must not
    # cascade into skipping parity verification (and, transitively, docker).
    # Only an upstream FAILURE blocks it.
    if: |
      always() &&
      (needs.rust.result == 'success' || needs.rust.result == 'skipped') &&
      (needs.go.result == 'success' || needs.go.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify hash parity (10,000 vectors)
        run: python scripts/verify_hash_parity.py

  # ───────── Stage 6: Docker Build + Dual-Push (main only) ─────────
  #
  # Builds each service image once (multi-arch: linux/amd64 + linux/arm64) and
  # pushes the resulting tag/digest to BOTH AWS ECR and GCP Artifact Registry
  # in parallel within the same buildx invocation. Both registries end up with
  # an identical OCI manifest digest, so a Cloud Run service pulling from AR
  # and an ECS task pulling from ECR resolve to the same bytes.
  #
  # Auth model:
  #   - AWS: GitHub OIDC → role assumption (`aws-actions/configure-aws-credentials`)
  #   - GCP: GitHub OIDC → Workload Identity Federation (`google-github-actions/auth`)
  #
  # If any of the three required secrets/vars are missing, the corresponding
  # registry login is skipped and the job emits a warning rather than failing
  # outright. This lets the pipeline keep working during phased rollout (e.g.
  # before the GCP WIP is provisioned in a fork).
  docker:
    # Build images for EVERY main merge, including ones where the path filter
    # skipped the rust/go jobs (ui-only, crates-only, services-only merges) —
    # otherwise those SHAs have no image set. Skipped upstream jobs are fine;
    # a failed or cancelled one still blocks the push. typescript and infra
    # have no path filter, so they must be strict successes.
    if: |
      always() && github.ref == 'refs/heads/main' &&
      (needs.rust.result == 'success'          || needs.rust.result == 'skipped') &&
      (needs.rust-features.result == 'success' || needs.rust-features.result == 'skipped') &&
      (needs.rust-wasm.result == 'success'     || needs.rust-wasm.result == 'skipped') &&
      (needs.go.result == 'success'            || needs.go.result == 'skipped') &&
      needs.typescript.result == 'success' &&
      needs.infra.result == 'success' &&
      (needs.hash-parity.result == 'success'   || needs.hash-parity.result == 'skipped')
    runs-on: ubuntu-latest
    needs: [rust, rust-features, rust-wasm, go, typescript, hash-parity, infra]
    permissions:
      id-token: write    # required for OIDC to AWS + GCP
      contents: read
    strategy:
      fail-fast: false   # one failing image shouldn't block the others
      matrix:
        service:
          - { name: assignment, path: crates/experimentation-assignment }
          - { name: pipeline, path: crates/experimentation-pipeline }
          - { name: analysis, path: crates/experimentation-analysis }
          - { name: policy, path: crates/experimentation-policy }
          - { name: flags, path: crates/experimentation-flags }
          - { name: management, path: services/management }
          - { name: metrics, path: services/metrics }
          - { name: orchestration, path: services/orchestration }
          - { name: ui, path: ui }
          - { name: healthgate, path: docker/healthgate }
    env:
      # Image coordinates, kept as env so the build/push step is one shell
      # block instead of branching across multiple step languages.
      IMAGE_NAME: kaizen-${{ matrix.service.name }}
      IMAGE_TAG: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Download generated proto code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: gen/

      # gen/go/go.mod + go.sum are tracked in git; the artifact overlays only
      # generated .go sources. No synthesized module file needed (the old
      # heredoc here injected a drifted go.mod that broke module-mode builds —
      # see #676).

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── AWS auth (OIDC) ────────────────────────────────────────────────
      - name: Configure AWS credentials
        id: aws-auth
        # Push-event gate: PR builds must stay build-only — without it any PR
        # would push :latest to ECR the moment AWS_DEPLOY_ROLE_ARN is set.
        if: vars.AWS_DEPLOY_ROLE_ARN != '' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: ecr-login
        if: steps.aws-auth.outcome == 'success'
        uses: aws-actions/amazon-ecr-login@v2

      # ── GCP auth (OIDC via Workload Identity Federation) ───────────────
      - name: Authenticate to Google Cloud
        id: gcp-auth
        # Same push-event gate as aws-auth above.
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_CI_PUSH_SA != '' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_PUSH_SA }}

      - name: Login to Google Artifact Registry
        if: steps.gcp-auth.outcome == 'success'
        uses: docker/login-action@v3
        with:
          # Default to "us" multi-region (matches Pulumi.gcp-dev.yaml's
          # gcpArLocation). Override via vars.GCP_AR_LOCATION if a specific
          # region is needed (e.g. data residency).
          registry: ${{ vars.GCP_AR_LOCATION || 'us' }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      # ── Compose dual-tag list, build once, push to both ───────────────
      - name: Compute image tags
        id: tags
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          GCP_AR_LOCATION: ${{ vars.GCP_AR_LOCATION || 'us' }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          tags=()
          if [ -n "${ECR_REGISTRY:-}" ]; then
            tags+=("${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}")
            tags+=("${ECR_REGISTRY}/${IMAGE_NAME}:latest")
          fi
          if [ -n "${GCP_PROJECT_ID:-}" ] && [ "${{ steps.gcp-auth.outcome }}" = "success" ]; then
            ar_repo="${GCP_AR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${IMAGE_NAME}"
            tags+=("${ar_repo}:${IMAGE_TAG}")
            tags+=("${ar_repo}:latest")
          fi
          if [ ${#tags[@]} -eq 0 ]; then
            echo "::warning::No registries configured (neither AWS_DEPLOY_ROLE_ARN nor GCP_PROJECT_ID set). Building without push."
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "tags=experimentation/${{ matrix.service.name }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "push=true" >> "$GITHUB_OUTPUT"
            # Comma-separated, the format docker/build-push-action expects.
            ( IFS=, ; echo "tags=${tags[*]}" ) >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push (multi-arch, multi-registry)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.path }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.tags.outputs.push == 'true' }}
          tags: ${{ steps.tags.outputs.tags }}
          # Provenance + SBOM attestations land on the manifest in BOTH
          # registries since buildx pushes the same OCI manifest object.
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Verify both registries received the same digest ───────────────
      - name: Verify cross-registry digest parity
        if: steps.tags.outputs.push == 'true' && steps.ecr-login.outcome == 'success' && steps.gcp-auth.outcome == 'success'
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          GCP_AR_LOCATION: ${{ vars.GCP_AR_LOCATION || 'us' }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          ecr_ref="${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          ar_ref="${GCP_AR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${IMAGE_NAME}:${IMAGE_TAG}"

          # `docker buildx imagetools inspect` emits the manifest digest in a
          # single "Digest:" line. Equality across the two registries is the
          # acceptance criterion — anything else means a divergent push and
          # downstream services on AWS vs GCP would silently see different
          # bytes.
          ecr_digest=$(docker buildx imagetools inspect "${ecr_ref}" | awk '/^Digest:/ { print $2; exit }')
          ar_digest=$(docker buildx imagetools inspect "${ar_ref}"  | awk '/^Digest:/ { print $2; exit }')
          echo "ECR digest: ${ecr_digest}"
          echo "AR  digest: ${ar_digest}"
          if [ -z "${ecr_digest}" ] || [ -z "${ar_digest}" ]; then
            echo "::error::Failed to read digest from one or both registries"
            exit 1
          fi
          if [ "${ecr_digest}" != "${ar_digest}" ]; then
            echo "::error::Digest mismatch between ECR and Artifact Registry"
            exit 1
          fi
          echo "✓ ECR and Artifact Registry resolved to identical digest"
